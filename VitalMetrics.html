}

// ══════════════════════════════════════════════════════════
// SCREEN: INTERVALLFASTEN
// ══════════════════════════════════════════════════════════
const FASTING_STAGES = [
  { h: 4,  emoji: '🍬', name: 'Zuckerverdauung',   desc: 'Insulin sinkt, Glykogen wird verbraucht.' },
  { h: 8,  emoji: '🔥', name: 'Fettverbrennung',    desc: 'Körper wechselt auf Fettverbrennung.' },
  { h: 12, emoji: '🧹', name: 'Tiefe Reinigung',    desc: 'Erste Autophagie-Prozesse starten.' },
  { h: 16, emoji: '♻️', name: 'Autophagie aktiv',   desc: 'Zellreinigung läuft — optimale Erneuerung.' },
  { h: 20, emoji: '⚡', name: 'Ketose & Fokus',     desc: 'Ketone steigen — mentale Klarheit.' },
];
const FASTING_PROTOCOLS = { '16:8': 16, '14:10': 14, '12:12': 12 };

function getFastingData() {
  return JSON.parse(localStorage.getItem('vitalmetrics_fasting') || '{"protocol":"16:8","isActive":false,"startTime":null,"streak":0,"log":[]}');
}
function saveFastingData(d) {
  localStorage.setItem('vitalmetrics_fasting', JSON.stringify(d));
}

function renderFasting(c) {
  let fd = getFastingData();
  let timerInterval = null;

  function elapsedMs() {
    if (!fd.isActive || !fd.startTime) return 0;
    return Date.now() - new Date(fd.startTime).getTime();
  }
  function fmtDuration(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function currentStage(ms) {
    const h = ms / 3600000;
    let stage = null;
    for (const s of FASTING_STAGES) { if (h >= s.h) stage = s; }
    return stage;
  }

  function buildHTML() {
    const targetH = FASTING_PROTOCOLS[fd.protocol] || 16;
    const ms = elapsedMs();
    const pct = Math.min(100, Math.round((ms / (targetH * 3600000)) * 100));
    const stage = currentStage(ms);
    const logReversed = [...(fd.log || [])].reverse().slice(0, 5);
    return `<div class="fasting-screen">
      <div style="display:flex;align-items:center;gap:12px;padding:20px 16px 8px">
        <button id="btn-back-fasting" style="background:none;font-size:22px;cursor:pointer">←</button>
        <span style="font-size:20px;font-weight:800">⏱️ Intervallfasten</span>
      </div>
      <div class="fasting-protocol-row">
        ${Object.keys(FASTING_PROTOCOLS).map(p=>`
          <button class="fasting-proto-btn ${fd.protocol===p?'active':''}" data-proto="${p}" ${fd.isActive?'disabled':''}>
            ${p}<div class="fasting-proto-label">${FASTING_PROTOCOLS[p]}h fasten</div>
          </button>`).join('')}
      </div>
      <div class="fasting-timer-card">
        <div class="fasting-status-label">${fd.isActive ? '⏱ Fasten läuft' : 'Bereit zum Fasten'}</div>
        <div class="fasting-clock" id="fasting-clock">${fd.isActive ? fmtDuration(ms) : '00:00:00'}</div>
        <div class="fasting-progress-wrap">
          <div class="fasting-progress-bar" id="fasting-bar" style="width:${pct}%"></div>
        </div>
        <div class="fasting-progress-text" id="fasting-pct">${pct}% von ${targetH}h Ziel</div>
        ${stage ? `<div class="fasting-stage">${stage.emoji} ${stage.name}</div>` : ''}
      </div>
      <button class="btn-fasting-toggle ${fd.isActive?'active':''}" id="btn-fasting-toggle">
        ${fd.isActive ? '⏹ Fasten beenden' : '▶ Fasten starten'}
      </button>
      <div class="fasting-streak">
        <div class="fasting-streak-num">🔥 ${fd.streak||0}</div>
        <div><div style="font-weight:700">Tage Streak</div><div class="fasting-streak-label">Tage in Folge ein Fastenprotokoll abgeschlossen</div></div>
      </div>
      <div style="padding:0 16px;margin-bottom:8px;font-size:14px;font-weight:700">Phasen des Fastens</div>
      <div class="fasting-stages-list">
        ${FASTING_STAGES.map(s=>{
          const reached = ms >= s.h * 3600000 && fd.isActive;
          return `<div class="fasting-stage-item ${reached?'reached':''}">
            <div class="fasting-stage-h">${s.emoji}<br>${s.h}h</div>
            <div><div class="fasting-stage-name">${s.name}</div><div class="fasting-stage-desc">${s.desc}</div></div>
          </div>`;
        }).join('')}
      </div>
      ${logReversed.length?`<div style="padding:0 16px;margin-bottom:8px;font-size:14px;font-weight:700">Letzte Einträge</div>
      <div class="fasting-history" style="margin:0 16px 24px">
        ${logReversed.map(l=>`<div class="fasting-history-row">
          <span>${l.date}</span>
          <span>${l.protocol}</span>
          <span>${Math.floor(l.duration/60)}h ${l.duration%60}min</span>
          <span class="status-badge" style="background:${l.completed?'#43a04720':'#e5393520'};color:${l.completed?'#43a047':'#e53935'}">${l.completed?'✓ Ziel':'Abgebrochen'}</span>
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }

  function updateTimer() {
    const ms = elapsedMs();
    const targetH = FASTING_PROTOCOLS[fd.protocol] || 16;
    const pct = Math.min(100, Math.round((ms / (targetH * 3600000)) * 100));
    const clockEl = c.querySelector('#fasting-clock');
    const barEl = c.querySelector('#fasting-bar');
    const pctEl = c.querySelector('#fasting-pct');
    if (clockEl) clockEl.textContent = fmtDuration(ms);
    if (barEl) barEl.style.width = pct + '%';
    if (pctEl) pctEl.textContent = `${pct}% von ${targetH}h Ziel`;
  }

  function attachEvents() {
    c.querySelector('#btn-back-fasting').addEventListener('click', () => navigate('tools'));
    c.querySelectorAll('.fasting-proto-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (fd.isActive) return;
        fd.protocol = btn.dataset.proto;
        saveFastingData(fd);
        c.innerHTML = '';
        c.innerHTML = buildHTML();
        attachEvents();
      });
    });
    c.querySelector('#btn-fasting-toggle').addEventListener('click', () => {
      if (fd.isActive) {
        // Stop fasting
        if (timerInterval) clearInterval(timerInterval);
        const ms = elapsedMs();
        const targetH = FASTING_PROTOCOLS[fd.protocol] || 16;
        const completed = ms >= targetH * 3600000;
        const durationMin = Math.floor(ms / 60000);
        if (!fd.log) fd.log = [];
        fd.log.push({ date: new Date().toISOString().slice(0,10), protocol: fd.protocol, duration: durationMin, completed });
        if (completed) fd.streak = (fd.streak || 0) + 1;
        else fd.streak = 0;
        fd.isActive = false;
        fd.startTime = null;
        saveFastingData(fd);
        showToast(completed ? `🎉 ${fd.protocol} geschafft! Streak: ${fd.streak} 🔥` : '⏹ Fasten beendet.');
      } else {
        fd.isActive = true;
        fd.startTime = new Date().toISOString();
        saveFastingData(fd);
        timerInterval = setInterval(updateTimer, 1000);
        showToast('▶ Fasten gestartet — viel Erfolg!');
      }
      c.innerHTML = '';
      c.innerHTML = buildHTML();
      attachEvents();
      if (fd.isActive) timerInterval = setInterval(updateTimer, 1000);
    });
  }

  c.innerHTML = buildHTML();
  attachEvents();
  if (fd.isActive) timerInterval = setInterval(updateTimer, 1000);
}

// ══════════════════════════════════════════════════════════
// SCREEN: BLUTZUCKER TAGESGANG
// ══════════════════════════════════════════════════════════
const GLUCOSE_SLOTS = [
  { key: 'nuechtern',        icon: '🌙', label: 'Nüchternwert',     hint: 'Morgens vor dem Frühstück', normal: [70,99],  warning: [100,125] },
  { key: 'nachFruehstueck',  icon: '☀️', label: 'Nach Frühstück',   hint: '2h nach der Mahlzeit',      normal: [0,139],  warning: [140,199] },
  { key: 'nachMittagessen',  icon: '🌤️', label: 'Nach Mittagessen', hint: '2h nach der Mahlzeit',      normal: [0,139],  warning: [140,199] },
  { key: 'abends',           icon: '🌇', label: 'Abendwert',        hint: 'Vor dem Schlafen',           normal: [70,109], warning: [110,139] },
];

function getGlucoseDayData() {
  return JSON.parse(localStorage.getItem('vitalmetrics_glucose_day') || '{}');
}
function saveGlucoseDayData(d) {
  localStorage.setItem('vitalmetrics_glucose_day', JSON.stringify(d));
}

function assessGlucosePattern(dayEntry) {
  if (!dayEntry) return null;
  const vals = Object.values(dayEntry).filter(v => v > 0);
  if (vals.length < 2) return null;
  const nuechtern = dayEntry.nuechtern;
  const postMeals = [dayEntry.nachFruehstueck, dayEntry.nachMittagessen].filter(Boolean);
  const avgPost = postMeals.length ? postMeals.reduce((a,b)=>a+b,0)/postMeals.length : null;
  if (nuechtern >= 126 || (avgPost && avgPost >= 200)) {
    return { level: 'alert', title: '⚠️ Auffälliges Muster', text: 'Deine Werte liegen wiederholt über den Normalwerten. Bitte besprich das zeitnah mit deinem Arzt — das kann auf Diabetes hinweisen.' };
  }
  if (nuechtern >= 100 || (avgPost && avgPost >= 140)) {
    return { level: 'warning', title: '🟡 Grenzwertiger Bereich', text: 'Dein Nüchternwert oder dein Anstieg nach Mahlzeiten ist leicht erhöht. Das kann ein frühes Zeichen von Insulinresistenz sein. Bewegung nach Mahlzeiten und weniger raffinierte Kohlenhydrate helfen gezielt.' };
  }
  return { level: 'normal', title: '✅ Gutes Muster', text: 'Dein Tagesgang sieht normal aus. Dein Körper verarbeitet Glucose gut — weiter so mit ausgewogener Ernährung und Bewegung.' };
}

function renderGlucoseDay(c) {
  let dayData = getGlucoseDayData();
  let currentDate = new Date().toISOString().slice(0,10);

  function fmtDisplayDate(iso) {
    const d = new Date(iso + 'T12:00:00');
    const today = new Date().toISOString().slice(0,10);
    if (iso === today) return 'Heute';
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (iso === yesterday) return 'Gestern';
    return d.toLocaleDateString('de-DE', { day:'numeric', month:'short' });
  }
  function shiftDate(iso, days) {
    const d = new Date(iso + 'T12:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0,10);
  }

  function buildChart(entry) {
    if (!entry) return '';
    const points = GLUCOSE_SLOTS.map(s => entry[s.key] || null);
    if (points.filter(Boolean).length < 2) return '';
    const maxV = Math.max(200, ...points.filter(Boolean));
    const minV = 50;
    const w = 280; const h = 100; const pad = 24;
    const xs = [0,1,2,3].map(i => pad + i * ((w-pad*2)/3));
    const ys = points.map(v => v ? h - pad - ((v - minV) / (maxV - minV)) * (h - pad*2) : null);
    let path = '';
    let dots = '';
    let prevX = null, prevY = null;
    points.forEach((v, i) => {
      if (v === null) { prevX = null; prevY = null; return; }
      const x = xs[i]; const y = ys[i];
      if (prevX !== null) path += ` L${x},${y}`; else path += `M${x},${y}`;
      const col = v >= 140 ? '#e53935' : v >= 100 ? '#ff9800' : '#43a047';
      dots += `<circle cx="${x}" cy="${y}" r="5" fill="${col}"/>`;
      dots += `<text x="${x}" y="${y-9}" text-anchor="middle" font-size="10" fill="${col}" font-weight="700">${v}</text>`;
      prevX = x; prevY = y;
    });
    const labels = GLUCOSE_SLOTS.map((s,i) => `<text x="${xs[i]}" y="${h-6}" text-anchor="middle" font-size="9" fill="#999">${s.icon}</text>`).join('');
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:110px">
      <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#eee" stroke-width="1"/>
      <path d="${path}" stroke="#43a047" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${labels}
    </svg>`;
  }

  function build() {
    const entry = dayData[currentDate] || {};
    const assessment = assessGlucosePattern(entry);
    const chart = buildChart(entry);
    const tomorrow = shiftDate(currentDate, 1);
    const canGoForward = tomorrow <= new Date().toISOString().slice(0,10);
    return `<div class="glucose-day-screen">
      <div style="display:flex;align-items:center;gap:12px;padding:20px 16px 8px">
        <button id="btn-back-glucose" style="background:none;font-size:22px;cursor:pointer">←</button>
        <span style="font-size:20px;font-weight:800">🩸 Tagesgang</span>
      </div>
      <div class="glucose-date-nav">
        <button class="glucose-date-btn" id="btn-glu-prev">‹</button>
        <span class="glucose-date-label">${fmtDisplayDate(currentDate)}</span>
        <button class="glucose-date-btn" id="btn-glu-next" ${!canGoForward?'disabled style="opacity:.4"':''}>›</button>
      </div>
      <div class="glucose-slots">
        ${GLUCOSE_SLOTS.map(s => `
          <div class="glucose-slot ${(entry[s.key]&&entry[s.key]>0)?'has-value':''}">
            <div class="glucose-slot-icon">${s.icon}</div>
            <div class="glucose-slot-info">
              <div class="glucose-slot-label">${s.label}</div>
              <div class="glucose-slot-hint">${s.hint}</div>
            </div>
            <input type="number" class="glucose-slot-input" data-key="${s.key}"
              value="${entry[s.key]||''}" placeholder="–" min="40" max="400">
            <span class="glucose-slot-unit">mg/dL</span>
          </div>`).join('')}
      </div>
      <div style="padding:0 16px 12px">
        <button class="btn-primary" id="btn-save-glucose" style="padding:13px">💾 Tageswerte speichern</button>
      </div>
      ${chart ? `<div class="glucose-chart-card"><div class="glucose-chart-title">📈 Tagesverlauf</div>${chart}</div>` : ''}
      ${assessment ? `<div class="glucose-status-card ${assessment.level}">
        <div class="glucose-status-title">${assessment.title}</div>
        <div class="glucose-status-text">${assessment.text}</div>
      </div>` : ''}
      <div class="glucose-info-box">
        💡 <strong>Wie du Spikes vermeidest:</strong> Ballaststoffe und Protein zuerst essen (vor den Kohlenhydraten) · 10–15 Minuten nach dem Essen spazieren gehen · 1 TL Apfelessig in Wasser vor der Mahlzeit · langsam essen und gut kauen.
      </div>
    </div>`;
  }

  function attachEvents() {
    c.querySelector('#btn-back-glucose').addEventListener('click', () => navigate('tools'));
    c.querySelector('#btn-glu-prev').addEventListener('click', () => {
      currentDate = shiftDate(currentDate, -1); c.innerHTML = build(); attachEvents();
    });
    const nextBtn = c.querySelector('#btn-glu-next');
    if (nextBtn && !nextBtn.disabled) nextBtn.addEventListener('click', () => {
      currentDate = shiftDate(currentDate, 1); c.innerHTML = build(); attachEvents();
    });
    c.querySelector('#btn-save-glucose').addEventListener('click', () => {
      const entry = {};
      c.querySelectorAll('.glucose-slot-input').forEach(inp => {
        const v = parseFloat(inp.value);
        if (!isNaN(v) && v > 0) entry[inp.dataset.key] = v;
      });
      dayData[currentDate] = entry;
      saveGlucoseDayData(dayData);
      showToast('✅ Tageswerte gespeichert!');
      c.innerHTML = build();
      attachEvents();
    });
  }

  c.innerHTML = build();
  attachEvents();
}

// SCREEN: HEIẞHUNGER-JOURNAL
// ══════════════════════════════════════════════════════════
const CRAVING_MOODS = [
  { key: 'stressed',  label: '😤 Stress' },
  { key: 'tired',     label: '😴 Müde' },
  { key: 'bored',     label: '😑 Gelangweilt' },
  { key: 'sad',       label: '😢 Traurig' },
  { key: 'happy',     label: '😊 Glücklich' },
  { key: 'neutral',   label: '😐 Neutral' },
];
const CRAVING_TRIGGERS = ['Stress', 'Müdigkeit', 'Langeweile', 'Hunger', 'Routine', 'Geruch/Sehen', 'Belohnung', 'Sonstiges'];

function getCravings() { return JSON.parse(localStorage.getItem('vitalmetrics_cravings') || '[]'); }
function saveCravings(d) { localStorage.setItem('vitalmetrics_cravings', JSON.stringify(d)); }

function analyzeCravings(list) {
  if (list.length < 3) return null;
  // Peak hour
  const hours = list.map(c => new Date(c.timestamp).getHours());
  const hourCount = {};
  hours.forEach(h => { hourCount[h] = (hourCount[h]||0)+1; });
  const peakHour = Object.entries(hourCount).sort((a,b)=>b[1]-a[1])[0];
  // Top trigger
  const trigCount = {};
  list.forEach(c => { if(c.trigger) trigCount[c.trigger] = (trigCount[c.trigger]||0)+1; });
  const topTrig = Object.entries(trigCount).sort((a,b)=>b[1]-a[1])[0];
  // Top mood
  const moodCount = {};
  list.forEach(c => { if(c.mood) moodCount[c.mood] = (moodCount[c.mood]||0)+1; });
  const topMood = Object.entries(moodCount).sort((a,b)=>b[1]-a[1])[0];
  // Avg hunger
  const avgHunger = list.filter(c=>c.hungerLevel).reduce((s,c)=>s+c.hungerLevel,0) / list.filter(c=>c.hungerLevel).length;
  return { peakHour: peakHour?.[0], topTrig: topTrig?.[0], topMood: topMood?.[0], avgHunger: avgHunger?.toFixed(1), total: list.length };
}

function renderCravings(c) {
  let cravings = getCravings();
  let formOpen = false;
  let selHunger = null, selMood = null, selTrigger = null;

  const MOOD_MAP = Object.fromEntries(CRAVING_MOODS.map(m => [m.key, m.label]));

  function buildPattern() {
    const a = analyzeCravings(cravings);
    if (!a) return '';
    const moodLabel = a.topMood ? MOOD_MAP[a.topMood] : '';
    return `<div class="craving-pattern-card">
      <div class="craving-pattern-title">🔍 Dein Muster (${a.total} Einträge)</div>
      ${a.peakHour ? `<div class="craving-pattern-stat">🕐 Häufigste Zeit: <strong>${a.peakHour}:00–${a.peakHour}:59 Uhr</strong></div>` : ''}
      ${a.topTrig  ? `<div class="craving-pattern-stat">⚡ Häufigster Auslöser: <strong>${a.topTrig}</strong></div>` : ''}
      ${moodLabel  ? `<div class="craving-pattern-stat">😶 Häufigste Stimmung: <strong>${moodLabel}</strong></div>` : ''}
      ${a.avgHunger? `<div class="craving-pattern-stat">🍽️ Durchschn. Hunger-Level: <strong>${a.avgHunger}/5</strong></div>` : ''}
    </div>`;
  }

  function buildForm() {
    if (!formOpen) return '';
    return `<div class="craving-form-card open">
      <div class="craving-form-title">➕ Heißhunger eintragen</div>
      <div class="craving-form-row">
        <div class="craving-form-label">Was hast du gegessen / wolltest du essen?</div>
        <input type="text" class="craving-what-input" id="craving-what" placeholder="z. B. Schokolade, Chips, Süßes...">
      </div>
      <div class="craving-form-row">
        <div class="craving-form-label">Hunger-Level (1 = schwach, 5 = extrem)</div>
        <div class="craving-hunger-row">
          ${[1,2,3,4,5].map(n=>`<button class="craving-hunger-btn ${selHunger===n?'active':''}" data-hunger="${n}">${['😐','🙁','😟','😣','🤤'][n-1]}<br><small>${n}</small></button>`).join('')}
        </div>
      </div>
      <div class="craving-form-row">
        <div class="craving-form-label">Stimmung gerade</div>
        <div class="craving-mood-row">
          ${CRAVING_MOODS.map(m=>`<button class="craving-mood-btn ${selMood===m.key?'active':''}" data-mood="${m.key}">${m.label}</button>`).join('')}
        </div>
      </div>
      <div class="craving-form-row">
        <div class="craving-form-label">Was hat es ausgelöst?</div>
        <div class="craving-trigger-row">
          ${CRAVING_TRIGGERS.map(t=>`<button class="craving-trigger-btn ${selTrigger===t?'active':''}" data-trigger="${t}">${t}</button>`).join('')}
        </div>
      </div>
      <div class="craving-form-row">
        <div class="craving-form-label">Notiz (optional)</div>
        <textarea class="craving-note-input" id="craving-note" placeholder="Was ist gerade los?"></textarea>
      </div>
      <button class="btn-save-craving" id="btn-save-craving">💾 Eintrag speichern</button>
    </div>`;
  }

  function buildList() {
    if (!cravings.length) return `<div class="craving-empty">📓 Noch keine Einträge.<br>Tippe oben auf „+ Eintrag", wenn Heißhunger aufkommt.</div>`;
    return `<div class="craving-list">
      <div class="craving-list-header">📓 Alle Einträge (${cravings.length})</div>
      ${[...cravings].reverse().map(cr => {
        const dt = new Date(cr.timestamp);
        const moodLabel = MOOD_MAP[cr.mood] || '';
        return `<div class="craving-item">
          <button class="btn-delete-craving" data-cid="${cr.id}">🗑️</button>
          <div class="craving-item-top">
            <span class="craving-item-what">${cr.what||'(unbenannt)'}</span>
            <span class="craving-item-time">${dt.toLocaleDateString('de-DE',{day:'numeric',month:'short'})} ${dt.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <div class="craving-item-tags">
            ${cr.hungerLevel?`<span class="craving-tag hunger">Hunger ${cr.hungerLevel}/5</span>`:''}
            ${moodLabel?`<span class="craving-tag mood">${moodLabel}</span>`:''}
            ${cr.trigger?`<span class="craving-tag trigger">${cr.trigger}</span>`:''}
          </div>
          ${cr.note?`<div style="font-size:12px;color:var(--text-hint);margin-top:6px">${cr.note}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  function build() {
    return `<div class="cravings-screen">
      <div class="cravings-header">
        <div style="display:flex;align-items:center;gap:10px">
          <button id="btn-back-cravings" style="background:none;font-size:22px;cursor:pointer">←</button>
          <span class="cravings-title">🍫 Heißhunger-Journal</span>
        </div>
        <button class="btn-add-craving" id="btn-toggle-form">${formOpen?'✕ Schließen':'+ Eintrag'}</button>
      </div>
      ${buildPattern()}
      ${buildForm()}
      ${buildList()}
    </div>`;
  }

  function attachEvents() {
    c.querySelector('#btn-back-cravings').addEventListener('click', () => navigate('tools'));
    c.querySelector('#btn-toggle-form').addEventListener('click', () => {
      formOpen = !formOpen; selHunger = null; selMood = null; selTrigger = null;
      c.innerHTML = build(); attachEvents();
    });
    if (formOpen) {
      c.querySelectorAll('.craving-hunger-btn').forEach(btn => btn.addEventListener('click', () => {
        selHunger = parseInt(btn.dataset.hunger); c.innerHTML = build(); attachEvents();
      }));
      c.querySelectorAll('.craving-mood-btn').forEach(btn => btn.addEventListener('click', () => {
        selMood = btn.dataset.mood; c.innerHTML = build(); attachEvents();
      }));
      c.querySelectorAll('.craving-trigger-btn').forEach(btn => btn.addEventListener('click', () => {
        selTrigger = btn.dataset.trigger; c.innerHTML = build(); attachEvents();
      }));
      c.querySelector('#btn-save-craving').addEventListener('click', () => {
        const what = c.querySelector('#craving-what').value.trim();
        if (!what) { showToast('Bitte Was eingeben'); return; }
        const note = c.querySelector('#craving-note').value.trim();
        cravings.push({ id: Date.now(), timestamp: new Date().toISOString(), what, hungerLevel: selHunger, mood: selMood, trigger: selTrigger, note });
        saveCravings(cravings);
        formOpen = false; selHunger = null; selMood = null; selTrigger = null;
        showToast('✅ Eintrag gespeichert!');
        c.innerHTML = build(); attachEvents();
      });
    }
    c.querySelectorAll('.btn-delete-craving').forEach(btn => btn.addEventListener('click', () => {
      if (confirm('Eintrag löschen?')) {
        cravings = cravings.filter(cr => cr.id !== parseInt(btn.dataset.cid));
        saveCravings(cravings); c.innerHTML = build(); attachEvents();
      }
    }));
  }

  c.innerHTML = build();
  attachEvents();
}

// BILLING BRIDGE — cordova-plugin-purchase v13
// Plugin: https://github.com/j3k0/cordova-plugin-purchase
// In browser/demo: test-unlock. In native Android: echte Google Play Billing.
// ══════════════════════════════════════════════════════════

const PRODUCT_IDS = {
  yearly:  'vitalmetrics_premium_yearly',   // muss exakt mit Google Play Console übereinstimmen
  monthly: 'vitalmetrics_premium_monthly',  // muss exakt mit Google Play Console übereinstimmen
};

// True wenn cordova-plugin-purchase geladen ist (= echter Android-Build)
function isBillingAvailable() {
  return !!(window.CdvPurchase && window.CdvPurchase.store);
}

// Wird beim App-Start aufgerufen (deviceready Event)
function initBillingStore() {
  if (!isBillingAvailable()) return; // Web/Demo-Modus — nichts tun

  const store = CdvPurchase.store;

  // Produkte registrieren
  store.register([
    { type: CdvPurchase.ProductType.PAID_SUBSCRIPTION, id: PRODUCT_IDS.yearly,  platform: CdvPurchase.Platform.GOOGLE_PLAY },
    { type: CdvPurchase.ProductType.PAID_SUBSCRIPTION, id: PRODUCT_IDS.monthly, platform: CdvPurchase.Platform.GOOGLE_PLAY },
  ]);

  // Kauf-Pipeline: approved → verify → finish → premium freischalten
  store.when()
    .approved(transaction => transaction.verify())
    .verified(receipt => receipt.finish())
    .finished(transaction => {
      // Prüfen ob eines unserer Produkte aktiv ist
      const activeIds = Object.values(PRODUCT_IDS);
      const isOurs = activeIds.some(id => transaction.products?.some(p => p.id === id));
      if (isOurs) {
        entitlements.setPremium(true);
        showToast('🎉 Premium freigeschaltet!');
        navigate('dashboard');
      }
    });

  // Store initialisieren (lädt Produktinfos von Google Play)
  store.initialize([CdvPurchase.Platform.GOOGLE_PLAY]);
}

async function purchasePremium(plan) {
  // ── Web / Demo-Modus ──
  if (!isBillingAvailable()) {
    entitlements.setPremium(true);
    showToast('🎉 Premium freigeschaltet! (Demo-Modus)');
    navigate('dashboard');
    return;
  }

  // ── Nativer Android-Build: Google Play Billing ──
  const store = CdvPurchase.store;
  const productId = PRODUCT_IDS[plan];
  const product = store.get(productId, CdvPurchase.Platform.GOOGLE_PLAY);

  if (!product) {
    showToast('Produkt nicht gefunden. Bitte Internetverbindung prüfen.');
    return;
  }

  const offer = product.getOffer();
  if (!offer) {
    showToast('Kein Angebot verfügbar. Bitte erneut versuchen.');
    return;
  }

  try {
    await store.order(offer);
    // Ergebnis kommt asynchron über den store.when().finished() Handler oben
  } catch (e) {
    if (e?.code !== CdvPurchase.ErrorCode.PAYMENT_CANCELLED) {
      showToast('Kauf fehlgeschlagen. Bitte erneut versuchen.');
    }
    // Abgebrochen: kein Toast, normales Verhalten
  }
}

async function restorePurchases() {
  if (!isBillingAvailable()) {
    showToast('💡 Wiederherstellung ist nur in der Android-App verfügbar.');
    return;
  }

  showToast('Käufe werden überprüft…');
  try {
    await CdvPurchase.store.restorePurchases();
    // Das finished-Event oben übernimmt die Verarbeitung
    // Falls nichts gefunden: nach kurzer Zeit Feedback geben
    setTimeout(() => {
      if (!entitlements.isPremium()) showToast('Kein aktives Abo gefunden.');
    }, 3000);
  } catch (e) {
    showToast('Wiederherstellung fehlgeschlagen. Bitte erneut versuchen.');
  }
}

// Schritte → Kalorien: ca. 0.04 kcal/Schritt bei 70 kg, gewichtsbereinigt
// Quelle: ACSM / Tudor-Locke et al. — Durchschnittswert ca. 0.57 kcal/Schritt pro 100 kg
function calcStepCalories(steps, weightKg) {
  return Math.round(steps * 0.0004 * (weightKg || 70));
}

function renderActivity(c) {
  const today = new Date().toISOString().slice(0, 10);
  const profile = profileRepo.get();
  const weightKg = profile.weight || 70;
  const week = activityRepo.getLast7Days();
  const dayData = activityRepo.getDay(today);
  const sportCal = dayData.activities.reduce((s, a) => s + (a.calories || 0), 0);
  const stepCal  = calcStepCalories(dayData.steps || 0, weightKg);
  const totalCal = sportCal + stepCal;
  const totalMin = dayData.activities.reduce((s, a) => s + (a.minutes || 0), 0);

  // Gesamtkalorien pro Tag inkl. Schritte für das Diagramm
  const weekWithTotal = week.map(d => {
    const sc = calcStepCalories(d.steps || 0, weightKg);
    return { ...d, totalCalories: d.calories + sc };
  });
  const maxCal = Math.max(...weekWithTotal.map(d => d.totalCalories), 1);
  const chartH = 100; // px Diagrammhöhe

  const sportOptions = SPORTS.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');
  const activityItems = dayData.activities.map((a, i) => {
    const sport = SPORTS.find(s => s.id === a.sport) || { emoji: '🏃', name: a.sport };
    return `<div class="activity-item">
      <div class="activity-item-left">
        <span class="activity-item-emoji">${sport.emoji}</span>
        <div>
          <div class="activity-item-name">${sport.name}</div>
          <div class="activity-item-time">${a.minutes} Min</div>
        </div>
      </div>
      <span class="activity-item-cal">${a.calories} kcal</span>
      <span class="activity-item-del" data-idx="${i}">✕</span>
    </div>`;
  }).join('');

  // Y-Achse: 3 Beschriftungen (0, Mitte, Max)
  const yMax = Math.ceil(maxCal / 50) * 50;
  const yMid = Math.round(yMax / 2);
  const bars = weekWithTotal.map(d => {
    const barH = yMax > 0 ? Math.max(3, Math.round((d.totalCalories / yMax) * chartH)) : 3;
    return `<div class="week-bar-wrap">
      <div class="week-bar-val">${d.totalCalories > 0 ? d.totalCalories : ''}</div>
      <div class="week-bar${d.isToday ? ' today' : ''}" style="height:${barH}px"></div>
      <span class="week-bar-label">${d.day}</span>
    </div>`;
  }).join('');

  c.innerHTML = `<div class="screen activity-screen">
    <div class="screen-header"><h1 class="screen-title">🏃 Bewegung</h1></div>

    <div class="activity-hero">
      <div class="activity-hero-left">
        <div style="font-size:13px;opacity:.85;margin-bottom:4px">Heute verbrannt</div>
        <div class="cal-big">${totalCal}</div>
        <div class="cal-unit">kcal gesamt · ${totalMin} Min Sport</div>
      </div>
      <div class="activity-hero-right">
        <div class="steps-num">${(dayData.steps || 0).toLocaleString('de-DE')}</div>
        <div class="steps-label">👟 Schritte · ${stepCal} kcal</div>
      </div>
    </div>

    <div class="activity-section">
      <h3>👟 Heutige Schritte</h3>
      <div class="steps-input-row">
        <input type="text" inputmode="numeric" id="inp-steps" placeholder="z. B. 8500" value="${dayData.steps || ''}">
        <button class="btn-primary" id="btn-save-steps" style="white-space:nowrap">Speichern</button>
      </div>
      ${stepCal > 0 ? `<p style="font-size:12px;color:var(--text-secondary);margin-top:8px">≈ ${stepCal} kcal durch Schritte</p>` : ''}
    </div>

    <div class="activity-section">
      <h3>➕ Sportart hinzufügen</h3>
      <div class="sport-picker-row">
        <select id="sel-sport" class="sport-select">${sportOptions}</select>
        <input type="text" inputmode="numeric" id="inp-minutes" class="minutes-input" placeholder="Min">
      </div>
      <button class="btn-primary" id="btn-add-sport" style="width:100%">Hinzufügen</button>
      ${activityItems ? `<div class="activity-list">${activityItems}</div>` : ''}
    </div>

    <div class="activity-section">
      <h3>📊 Wochenverlauf</h3>
      <div style="display:flex;gap:6px;align-items:flex-end">
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:${chartH+16}px;padding-bottom:20px;min-width:32px">
          <span style="font-size:10px;color:var(--text-hint);text-align:right">${yMax}</span>
          <span style="font-size:10px;color:var(--text-hint);text-align:right">${yMid}</span>
          <span style="font-size:10px;color:var(--text-hint);text-align:right">0</span>
        </div>
        <div style="flex:1;display:flex;gap:4px;align-items:flex-end;height:${chartH+16}px;padding-bottom:20px;border-left:1px solid var(--border);padding-left:4px">${bars}</div>
      </div>
    </div>
  </div>`;

  c.querySelector('#btn-save-steps').addEventListener('click', () => {
    const steps = parseInt(c.querySelector('#inp-steps').value) || 0;
    const current = activityRepo.getDay(today);
    activityRepo.saveDay(today, { ...current, steps });
    showToast('Schritte gespeichert ✓');
    renderActivity(c);
  });

  c.querySelector('#btn-add-sport').addEventListener('click', () => {
    const sportId = c.querySelector('#sel-sport').value;
    const minutes = parseInt(c.querySelector('#inp-minutes').value);
    if (!minutes || minutes < 1) { showToast('Bitte Minuten eingeben'); return; }
    const sport = SPORTS.find(s => s.id === sportId);
    const calories = calcCalories(sport.met, minutes, weightKg);
    const current = activityRepo.getDay(today);
    current.activities = current.activities || [];
    current.activities.push({ sport: sportId, minutes, calories });
    activityRepo.saveDay(today, current);
    showToast(`${sport.emoji} ${sport.name} gespeichert`);
    renderActivity(c);
  });

  c.querySelectorAll('.activity-item-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const current = activityRepo.getDay(today);
      current.activities.splice(idx, 1);
      activityRepo.saveDay(today, current);
      renderActivity(c);
    });
  });
}

function renderCycle(c) {
  const data = cycleRepo.get();
  const phase = cycleRepo.getCurrentPhase();
  const next = cycleRepo.predictNext();
  const phaseKey = phase ? phase.phase : 'unknown';
  const phaseInfo = CYCLE_PHASE_INFO[phaseKey] || {};
  const nutrients = CYCLE_NUTRIENTS[phaseKey] || [];
  const avgCycle = data.cycleLength || 28;
  const today = new Date().toISOString().slice(0, 10);

  const nutrientHTML = nutrients.map(n => `
    <div class="cycle-nutrient-item">
      <span class="cycle-nutrient-emoji">${n.emoji}</span>
      <div>
        <div class="cycle-nutrient-name">${n.name}</div>
        <div class="cycle-nutrient-why">${n.why}</div>
      </div>
    </div>`).join('');

  // Mini calendar — current month
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const offset = (firstDay + 6) % 7; // Mo=0

  let calHTML = '';
  for (let i = 0; i < offset; i++) calHTML += '<div class="cycle-day other-month"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    let dayPhase = '';
    if (data.periodStarts.length) {
      const last = new Date(data.periodStarts[data.periodStarts.length - 1]);
      const diff = Math.floor((new Date(dateStr) - last) / 86400000);
      const cl = data.cycleLength || 28;
      const pl = data.periodLength || 5;
      const dayInCycle = ((diff % cl) + cl) % cl + 1;
      if (dayInCycle <= pl) dayPhase = 'menstruation';
      else if (dayInCycle <= 13) dayPhase = 'follicular';
      else if (dayInCycle <= 15) dayPhase = 'ovulation';
      else dayPhase = 'luteal';
    }
    calHTML += `<div class="cycle-day ${dayPhase}${isToday ? ' today' : ''}">${d}</div>`;
  }

  c.innerHTML = `<div class="screen cycle-screen">
    <div class="screen-header"><h1 class="screen-title">🌙 Zyklus</h1></div>

    <div class="cycle-phase-card ${phaseKey}">

    const dateStr = c.querySelector('#inp-period-start').value;
    if (!dateStr) { showToast('Bitte Datum wählen'); return; }
    const d = cycleRepo.get();
    d.periodStarts = [...d.periodStarts.filter(s => s !== dateStr), dateStr].sort();
    cycleRepo.save(d);
    showToast('Periode eingetragen ✓');
    renderCycle(c);
  });

  c.querySelector('#btn-save-cycle').addEventListener('click', () => {
    const cl = parseInt(c.querySelector('#inp-cycle-len').value) || 28;
    const pl = parseInt(c.querySelector('#inp-period-len').value) || 5;
    cycleRepo.save({ cycleLength: cl, periodLength: pl });
    showToast('Einstellungen gespeichert ✓');
    renderCycle(c);
  });
}

// DGE-Referenzwerte für Erwachsene (alters- und geschlechtsangepasst)
function getDGERef(ageGroup, sex) {
  const isF = sex === 'f';
  const is51 = ageGroup === '51-70' || ageGroup === '70+';
  const is70 = ageGroup === '70+';
  return {
    vit_a:  { label:'Vitamin A',  unit:'µg', ref: isF ? 700 : 850 },
    vit_d:  { label:'Vitamin D',  unit:'µg', ref: is51 ? 20 : 20 },
    vit_e:  { label:'Vitamin E',  unit:'mg', ref: isF ? 12 : 15 },
    vit_k:  { label:'Vitamin K',  unit:'µg', ref: isF ? 60 : 70 },
    vit_c:  { label:'Vitamin C',  unit:'mg', ref: 110 },
    b1:     { label:'Vitamin B1', unit:'mg', ref: isF ? 1.0 : 1.3 },
    b2:     { label:'Vitamin B2', unit:'mg', ref: isF ? 1.1 : 1.4 },
    b3:     { label:'Vitamin B3', unit:'mg', ref: isF ? 13 : 16 },
    b6:     { label:'Vitamin B6', unit:'mg', ref: is51 ? (isF ? 1.5 : 1.7) : (isF ? 1.4 : 1.6) },
    b12:    { label:'Vitamin B12',unit:'µg', ref: 4.0 },
    folat:  { label:'Folat',      unit:'µg', ref: 300 },
    eisen:  { label:'Eisen',      unit:'mg', ref: isF && !is51 ? 15 : 10 },
    zink:   { label:'Zink',       unit:'mg', ref: isF ? 8 : 11 },
    mag:    { label:'Magnesium',  unit:'mg', ref: isF ? 300 : 350 },
    cal:    { label:'Calcium',    unit:'mg', ref: is70 ? 1200 : 1000 },
  };
}

// Ernährungs-Repository
const nutritionRepo = {
  _key: 'vm_nutrition',
  _load() { return storage.get(this._key) || {}; },
  getDay(dateStr) { return this._load()[dateStr] || []; },
  addEntry(dateStr, entry) {
    const all = this._load();
    all[dateStr] = [...(all[dateStr] || []), entry];
    storage.set(this._key, all);
  },
  removeEntry(dateStr, idx) {
    const all = this._load();
    all[dateStr] = (all[dateStr] || []).filter((_,i) => i !== idx);
    storage.set(this._key, all);
  },
  getDayTotals(dateStr) {
    const entries = this.getDay(dateStr);
    const keys = ['vit_a','vit_d','vit_e','vit_k','vit_c','b1','b2','b3','b6','b12','folat','eisen','zink','mag','cal'];
    const totals = Object.fromEntries(keys.map(k => [k, 0]));
    totals.kcal = 0; totals.protein = 0; totals.fat = 0; totals.carbs = 0;
    for (const e of entries) {
      // Support both new format {food:{...}, grams} and old format {foodId:'...', grams}
      const food = e.food ? e.food : FOOD_DB.find(f => f.id === e.foodId);
      if (!food) continue;
      const factor = e.grams / 100;
      totals.kcal += Math.round(food.kal * factor);
      totals.protein = Math.round((totals.protein + (food.protein || 0) * factor) * 10) / 10;
      totals.fat     = Math.round((totals.fat     + (food.fat     || 0) * factor) * 10) / 10;
      totals.carbs   = Math.round((totals.carbs   + (food.carbs   || 0) * factor) * 10) / 10;
      for (const k of keys) totals[k] = Math.round((totals[k] + (food[k] || 0) * factor) * 10) / 10;
    }
    return totals;
  }
};

// ── Open Food Facts helpers ──────────────────────────────────────────────────
function _offEmoji(product) {
  const cats = (product.categories_tags || []).join(' ');
  if (/en:fruits|obst/.test(cats))   return '🍎';
  if (/en:vegetables|gemüse/.test(cats)) return '🥦';
  if (/en:meats|fleisch/.test(cats)) return '🥩';
  if (/en:fish|fisch/.test(cats))   return '🐟';
  if (/en:dairy|milch/.test(cats))  return '🥛';
  if (/en:breads|brot/.test(cats))  return '🍞';
  if (/en:beverages|getränk/.test(cats)) return '🥤';
  if (/en:sweet|süß/.test(cats))    return '🍫';
  if (/en:cereals/.test(cats))      return '🥣';
  if (/en:nuts/.test(cats))         return '🥜';
  return '🍽️';
}

function mapOFFFood(product) {
  const n = product.nutriments || {};
  const rawName = (product.product_name || '').trim() || 'Unbekannt';
  const brand   = product.brands ? product.brands.split(',')[0].trim() : '';
  return {
    name:    rawName.slice(0, 50),
    brand,
    emoji:   _offEmoji(product),
    kal:     Math.round(n['energy-kcal_100g'] || (n['energy_100g'] || 0) / 4.184),
    protein: Math.round((n['proteins_100g']       || 0) * 10) / 10,
    fat:     Math.round((n['fat_100g']            || 0) * 10) / 10,
    carbs:   Math.round((n['carbohydrates_100g']  || 0) * 10) / 10,
    // Micronutrients as supplied by OFF (units may vary; best-effort)
    vit_a:  n['vitamin-a_100g']  || 0,
    vit_d:  n['vitamin-d_100g']  || 0,
    vit_e:  n['vitamin-e_100g']  || 0,
    vit_k:  n['vitamin-k_100g']  || 0,
    vit_c:  n['vitamin-c_100g']  || 0,
    b1:     n['vitamin-b1_100g'] || 0,
    b2:     n['vitamin-b2_100g'] || 0,
    b3:     n['niacin_100g']     || 0,
    b6:     n['vitamin-b6_100g'] || 0,
    b12:    n['vitamin-b12_100g']|| 0,
    folat:  n['folates_100g']    || 0,
    eisen:  n['iron_100g']       || 0,
    zink:   n['zinc_100g']       || 0,
    mag:    n['magnesium_100g']  || 0,
    cal:    n['calcium_100g']    || 0,
    source: 'openfoodfacts'
  };
}

// Module-level state for the nutrition search (survives DOM re-renders within screen)
let _nutrState = { selectedFood: null, searchProducts: [], searchTimer: null };

function renderNutrition(c) {
  _nutrState.selectedFood  = null;
  _nutrState.searchProducts = [];

  const today   = new Date().toISOString().slice(0, 10);
  const profile = profileRepo.get();
  const ref     = getDGERef(profile.ageGroup, profile.sex);
  const entries = nutritionRepo.getDay(today);
  const totals  = nutritionRepo.getDayTotals(today);

  // ── Entry list ──────────────────────────────────────────────────────────────
  const entryList = entries.map((e, i) => {
    const food = e.food ? e.food : FOOD_DB.find(f => f.id === e.foodId);
    if (!food) return '';
    const kcal = Math.round(food.kal * e.grams / 100);
    return `<div class="activity-item">
      <div class="activity-item-left">
        <span class="activity-item-emoji">${food.emoji || '🍽️'}</span>
        <div>
          <div class="activity-item-name">${food.name}</div>
          <div class="activity-item-time">${e.grams} g · ${kcal} kcal</div>
        </div>
      </div>
      <span class="activity-item-del" data-idx="${i}">✕</span>
    </div>`;
  }).join('');

  // ── Macro tiles ─────────────────────────────────────────────────────────────
  const macrosHtml = entries.length ? `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div style="text-align:center;background:var(--surface2);border-radius:8px;padding:8px">
        <div style="font-size:18px;font-weight:700;color:var(--primary)">${Math.round(totals.protein)}g</div>
        <div style="font-size:11px;color:var(--text-secondary)">Protein</div>
      </div>
      <div style="text-align:center;background:var(--surface2);border-radius:8px;padding:8px">
        <div style="font-size:18px;font-weight:700;color:#f59e0b">${Math.round(totals.fat)}g</div>
        <div style="font-size:11px;color:var(--text-secondary)">Fett</div>
      </div>
      <div style="text-align:center;background:var(--surface2);border-radius:8px;padding:8px">
        <div style="font-size:18px;font-weight:700;color:#3b82f6">${Math.round(totals.carbs)}g</div>
        <div style="font-size:11px;color:var(--text-secondary)">Kohlenhydrate</div>
      </div>
    </div>` : '';

  // ── Micronutrient bars ──────────────────────────────────────────────────────
  const nutrients = Object.entries(ref).map(([key, info]) => {
    const val = totals[key] || 0;
    const pct = Math.min(100, Math.round((val / info.ref) * 100));
    const color = pct >= 100 ? 'var(--primary)' : pct >= 60 ? '#f59e0b' : '#ef4444';
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="font-weight:600">${info.label}</span>
        <span style="color:var(--text-secondary)">${val} / ${info.ref} ${info.unit}
          <span style="color:${color};font-weight:700"> ${pct}%</span></span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s"></div>
      </div>
    </div>`;
  }).join('');

  // ── Render ──────────────────────────────────────────────────────────────────
  c.innerHTML = `<div class="screen">
    <div class="screen-header"><h1 class="screen-title">🥗 Ernährung</h1></div>

    <div class="activity-hero">
      <div class="activity-hero-left">
        <div style="font-size:13px;opacity:.85;margin-bottom:4px">Heute gegessen</div>
        <div class="cal-big">${totals.kcal}</div>
        <div class="cal-unit">kcal · ${entries.length} Mahlzeit${entries.length !== 1 ? 'en' : ''}</div>
      </div>
    </div>

    <div class="activity-section">
      <h3>➕ Lebensmittel hinzufügen</h3>

      <!-- Search bar -->
      <div style="position:relative;margin-bottom:8px">
        <input type="text" id="inp-food-search" class="sport-select"
          style="width:100%;padding-right:36px"
          placeholder="🔍 Lebensmittel suchen (Open Food Facts)…">
        <button id="btn-search-clear"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:18px;display:none;background:none;border:none;cursor:pointer">✕</button>
      </div>

      <!-- Search results injected here -->
      <div id="nutr-results" style="margin-bottom:8px"></div>

      <!-- Selected food confirmation card -->
      <div id="nutr-card" style="display:none;background:var(--primary-light);border-radius:10px;padding:12px;margin-bottom:10px">
        <div id="nutr-card-name" style="font-size:13px;font-weight:600;margin-bottom:8px"></div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" inputmode="numeric" id="inp-grams"
            class="minutes-input" placeholder="Gramm" style="flex:1">
          <button class="btn-primary" id="btn-add-food" style="flex:2">Hinzufügen</button>
        </div>
      </div>

      <!-- Manual entry toggle -->
      <button id="btn-custom-toggle"
        style="width:100%;padding:10px;border:2px dashed var(--border);border-radius:8px;
               color:var(--text-secondary);font-size:13px;background:none;cursor:pointer">
        ✏️ Eigenes Lebensmittel manuell eingeben
      </button>

      <!-- Manual entry form -->
      <div id="nutr-custom-form" style="display:none;background:var(--surface2);border-radius:10px;padding:14px;margin-top:8px">
        <div style="font-weight:600;margin-bottom:10px">Eigenes Lebensmittel (pro 100 g)</div>
        <input type="text" id="inp-c-name"   class="sport-select" style="width:100%;margin-bottom:6px" placeholder="Name (z. B. Omas Linseneintopf)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
          <input type="text" inputmode="numeric" id="inp-c-kal"     class="minutes-input" placeholder="kcal / 100 g">
          <input type="text" inputmode="numeric" id="inp-c-protein"  class="minutes-input" placeholder="Protein g">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          <input type="text" inputmode="numeric" id="inp-c-fat"      class="minutes-input" placeholder="Fett g">
          <input type="text" inputmode="numeric" id="inp-c-carbs"    class="minutes-input" placeholder="Kohlenhydrate g">
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" inputmode="numeric" id="inp-c-grams"    class="minutes-input" placeholder="Gramm" style="flex:1">
          <button class="btn-primary" id="btn-add-custom" style="flex:2">Hinzufügen</button>
        </div>
      </div>

      ${entryList ? `<div class="activity-list" style="margin-top:14px">${entryList}</div>` : ''}
    </div>

    <div class="activity-section">
      <h3>📊 Makros heute</h3>
      ${macrosHtml || '<p style="font-size:13px;color:var(--text-secondary)">Noch keine Einträge.</p>'}
      ${entries.length ? `
        <h3 style="margin-top:4px">🧬 Mikronährstoffe</h3>
        <p style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">
          DGE-Referenzwerte · Bei Fertigprodukten können Mikronährstoffe fehlen
        </p>
        ${nutrients}` : ''}
    </div>
  </div>`;

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const searchInput   = c.querySelector('#inp-food-search');
  const searchClear   = c.querySelector('#btn-search-clear');
  const resultsBox    = c.querySelector('#nutr-results');
  const card          = c.querySelector('#nutr-card');
  const cardName      = c.querySelector('#nutr-card-name');
  const gramsInput    = c.querySelector('#inp-grams');
  const addBtn        = c.querySelector('#btn-add-food');
  const customToggle  = c.querySelector('#btn-custom-toggle');
  const customForm    = c.querySelector('#nutr-custom-form');

  // ── Search ──────────────────────────────────────────────────────────────────
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.style.display = q ? '' : 'none';
    card.style.display = 'none';
    _nutrState.selectedFood = null;
    clearTimeout(_nutrState.searchTimer);
    if (q.length < 2) { resultsBox.innerHTML = ''; return; }
    resultsBox.innerHTML = `<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:13px">🔍 Suche läuft…</div>`;
    _nutrState.searchTimer = setTimeout(() => _offSearch(q), 500);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.style.display = 'none';
    resultsBox.innerHTML = '';
    card.style.display = 'none';
    _nutrState.selectedFood = null;
  });

  // ── Add from search ─────────────────────────────────────────────────────────
  addBtn.addEventListener('click', () => {
    const grams = parseInt(gramsInput.value);
    if (!grams || grams < 1) { showToast('Bitte Gramm eingeben'); return; }
    if (!_nutrState.selectedFood) return;
    nutritionRepo.addEntry(today, { food: _nutrState.selectedFood, grams });
    showToast(`${_nutrState.selectedFood.emoji} ${_nutrState.selectedFood.name} hinzugefügt`);
    renderNutrition(c);
  });

  // ── Manual entry ────────────────────────────────────────────────────────────
  customToggle.addEventListener('click', () => {
    customForm.style.display = customForm.style.display === 'none' ? 'block' : 'none';
  });

  c.querySelector('#btn-add-custom').addEventListener('click', () => {
    const name   = c.querySelector('#inp-c-name').value.trim();
    const kal    = parseFloat(c.querySelector('#inp-c-kal').value)    || 0;
    const protein= parseFloat(c.querySelector('#inp-c-protein').value) || 0;
    const fat    = parseFloat(c.querySelector('#inp-c-fat').value)    || 0;
    const carbs  = parseFloat(c.querySelector('#inp-c-carbs').value)  || 0;
    const grams  = parseInt(c.querySelector('#inp-c-grams').value)    || 0;
    if (!name)  { showToast('Bitte einen Namen eingeben'); return; }
    if (!grams) { showToast('Bitte Gramm eingeben'); return; }
    const food = { name, emoji:'🍽️', kal, protein, fat, carbs,
      vit_a:0, vit_d:0, vit_e:0, vit_k:0, vit_c:0,
      b1:0, b2:0, b3:0, b6:0, b12:0, folat:0, eisen:0, zink:0, mag:0, cal:0,
      source:'custom' };
    nutritionRepo.addEntry(today, { food, grams });
    showToast(`✏️ ${name} hinzugefügt`);
    renderNutrition(c);
  });

  // ── Delete entry ────────────────────────────────────────────────────────────
  c.querySelectorAll('.activity-item-del').forEach(btn => {
    btn.addEventListener('click', () => {
      nutritionRepo.removeEntry(today, parseInt(btn.dataset.idx));
      renderNutrition(c);
    });
  });

  // ── OFF search function (async, scoped here) ────────────────────────────────
  async function _offSearch(query) {
    try {
      const url = `https://world.openfoodfacts.org/cgi/search.pl?`
        + `search_terms=${encodeURIComponent(query)}`
        + `&json=1&lc=de&page_size=10&search_simple=1`
        + `&fields=product_name,brands,nutriments,categories_tags`;
      const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const products = (data.products || [])
        .filter(p => p.product_name && (p.nutriments?.['energy-kcal_100g'] || p.nutriments?.['energy_100g']));

      if (!products.length) {
        resultsBox.innerHTML = `<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:13px">
          Keine Ergebnisse. Anderen Suchbegriff probieren oder manuell eingeben.</div>`;
        return;
      }

      _nutrState.searchProducts = products.map(mapOFFFood);

      resultsBox.innerHTML = `<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">
        ${_nutrState.searchProducts.map((food, i) => `
          <div class="off-result" data-idx="${i}"
            style="padding:10px 12px;${i > 0 ? 'border-top:1px solid var(--border)' : ''};
                   cursor:pointer;display:flex;justify-content:space-between;align-items:center;
                   background:var(--surface)">
            <div style="flex:1;min-width:0;margin-right:8px">
              <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                ${food.emoji} ${food.name}
              </div>
              ${food.brand ? `<div style="font-size:11px;color:var(--text-secondary)">${food.brand}</div>` : ''}
            </div>
            <div style="font-size:13px;font-weight:700;color:var(--primary);white-space:nowrap">
              ${food.kal} kcal
            </div>
          </div>`).join('')}
      </div>`;

      resultsBox.querySelectorAll('.off-result').forEach(el => {
        el.addEventListener('click', () => {
          const food = _nutrState.searchProducts[parseInt(el.dataset.idx)];
          _nutrState.selectedFood = food;
          cardName.innerHTML = `${food.emoji} <strong>${food.name}</strong>`
            + (food.brand ? ` · <span style="color:var(--text-secondary)">${food.brand}</span>` : '')
            + `<br><span style="font-size:11px;color:var(--text-secondary)">
               ${food.kal} kcal · ${food.protein}g P · ${food.fat}g F · ${food.carbs}g KH pro 100 g</span>`;
          card.style.display = 'block';
          resultsBox.innerHTML = '';
          searchInput.value = food.name.slice(0, 40);
          searchClear.style.display = '';
          gramsInput.value = '';
          gramsInput.focus();
        });
      });
    } catch (err) {
      resultsBox.innerHTML = `<div style="text-align:center;padding:12px;color:#ef4444;font-size:13px">
        ⚠️ Keine Verbindung zu Open Food Facts.<br>
        <span style="color:var(--text-secondary)">Internetverbindung prüfen oder Lebensmittel manuell eingeben.</span></div>`;
    }
  }
}

// ══════════════════════════════════════════════════════════
// SCREEN: VORERKRANKUNGEN
// ══════════════════════════════════════════════════════════
const illnessRepo = {
  _key: 'vm_illness',
  get() { return storage.get(this._key) || { conditions: [], entries: [] }; },
  save(data) { storage.set(this._key, data); },
  addCondition(name) {
    const d = this.get();
    if (!d.conditions.includes(name)) d.conditions.push(name);
    this.save(d);
  },
  addEntry(entry) {
    const d = this.get();
    d.entries.unshift(entry);
    this.save(d);
  },
  removeEntry(idx) {
    const d = this.get();
    d.entries.splice(idx, 1);
    this.save(d);
  }
};

// Vorerkrankungs-Screen wird im Profil-Screen eingebettet (siehe renderProfile)

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => navigate(item.dataset.screen)));
  const profile = profileRepo.get();
  // Zyklus-Tab nur für weibliche Nutzer anzeigen
  if (profile.sex === 'f') {
    document.querySelectorAll('.nav-cycle').forEach(el => el.style.display = '');
  }
  navigate(profile.onboardingDone ? 'dashboard' : 'onboarding');

  // Billing Store initialisieren sobald das Gerät bereit ist (Capacitor/Cordova)
  document.addEventListener('deviceready', initBillingStore, false);

  // Smart Reminders initialisieren (nur nativer Android-Build)
  document.addEventListener('deviceready', initReminders, false);
});
</script>

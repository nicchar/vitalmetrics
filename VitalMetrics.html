<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a7a6e">
<title>VitalMetrics</title>
<style>
/* ============================================================
   VitalMetrics – Mobile-first Stylesheet
   Design: Clean Health App, Teal primary color
   ============================================================ */

:root {
  --primary:       #1a7a6e;
  --primary-light: #e6f4f2;
  --primary-dark:  #145f56;
  --primary-glow:  rgba(26,122,110,0.18);
  --bg:            #f0f4f5;
  --surface:       #ffffff;
  --surface2:      #f8fafb;
  --border:        #e4eaec;
  --text:          #1a2428;
  --text-secondary:#5a6e75;
  --text-hint:     #9badb4;
  --ok:            #16a34a;
  --low:           #dc2626;
  --high:          #ea580c;
  --unknown:       #94a3b8;
  --nav-height:    64px;
  --radius:        14px;
  --radius-sm:     8px;
  --shadow-sm:     0 1px 4px rgba(0,0,0,0.06);
  --shadow:        0 4px 14px rgba(0,0,0,0.08);
  --shadow-lg:     0 8px 28px rgba(0,0,0,0.12);
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }
ul { list-style: none; }

/* ── App Shell ── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#screen-container {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-height) + 16px);
}

/* ── Screen Base ── */
.screen { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 24px; }

/* ── Screen Header ── */
.screen-header { margin-bottom: 20px; }

.app-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.8px;
}
.app-subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 3px; font-weight: 400; }
.screen-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }

/* ── Category Section ── */
.category-section { margin-bottom: 28px; }
.category-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-hint);
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ── Biomarker Grid ── */
.biomarker-grid { display: flex; flex-direction: column; gap: 10px; }

.biomarker-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  border: 1px solid transparent;
}
.biomarker-card:active { transform: scale(0.98); }
.biomarker-card:hover { box-shadow: var(--shadow); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-name { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-value { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.card-ref { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
.card-actions { display: flex; gap: 8px; margin-top: 10px; }

.btn-card {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1px;
}
.btn-entry {
  background: var(--primary-light);
  color: var(--primary);
}
.btn-entry:hover { background: #d0ecea; }
.btn-trend {
  background: var(--surface2);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-trend:hover { background: var(--border); }

/* ── Bottom Navigation ── */
.bottom-nav {
  height: var(--nav-height);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 2px;
  color: var(--text-hint);
  transition: color 0.2s;
}
.nav-item.active { color: var(--primary); }
.nav-item.active .nav-icon-wrap {
  background: var(--primary-light);
  border-radius: 10px;
  padding: 3px 8px;
}
.nav-icon-wrap { padding: 3px 8px; transition: background 0.2s; }
.nav-icon { font-size: 18px; display: block; }
.nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.2px; }

/* ── Activity Screen ── */
.activity-screen { padding-bottom: 32px; }
.activity-hero { background: linear-gradient(135deg, var(--primary), #1a7a6e); color: #fff; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.activity-hero-left h2 { font-size: 14px; font-weight: 600; opacity: 0.85; margin-bottom: 4px; }
.activity-hero-left .cal-big { font-size: 36px; font-weight: 800; }
.activity-hero-left .cal-unit { font-size: 13px; opacity: 0.8; }
.activity-hero-right { text-align: right; }
.activity-hero-right .steps-num { font-size: 26px; font-weight: 800; }
.activity-hero-right .steps-label { font-size: 12px; opacity: 0.8; }
.activity-section { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
.activity-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.steps-input-row { display: flex; gap: 10px; align-items: center; }
.steps-input-row input { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 18px; font-weight: 700; text-align: center; }
.steps-input-row input:focus { border-color: var(--primary); outline: none; }
.sport-picker-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.sport-select { flex: 1; min-width: 140px; padding: 10px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; }
.sport-select:focus { border-color: var(--primary); outline: none; }
.minutes-input { width: 80px; padding: 10px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; text-align: center; }
.minutes-input:focus { border-color: var(--primary); outline: none; }
.activity-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.activity-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: 10px; padding: 10px 14px; }
.activity-item-left { display: flex; align-items: center; gap: 10px; }
.activity-item-emoji { font-size: 22px; }
.activity-item-name { font-size: 14px; font-weight: 600; }
.activity-item-time { font-size: 12px; color: var(--text-secondary); }
.activity-item-cal { font-size: 14px; font-weight: 700; color: var(--primary); }
.activity-item-del { font-size: 16px; color: var(--text-hint); padding: 4px 8px; cursor: pointer; }
.week-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 12px; }
.week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.week-bar { width: 100%; background: var(--primary-light); border-radius: 6px 6px 0 0; transition: height 0.4s ease; min-height: 3px; }
.week-bar.today { background: var(--primary); }
.week-bar-label { font-size: 10px; color: var(--text-hint); font-weight: 600; }
.week-bar-val { font-size: 9px; color: var(--text-secondary); font-weight: 700; text-align: center; min-height: 14px; }

/* ── Cycle Screen ── */
.cycle-screen { padding-bottom: 32px; }
.cycle-phase-card { border-radius: var(--radius); padding: 20px; margin-bottom: 16px; color: #fff; }
.cycle-phase-card.menstruation { background: linear-gradient(135deg, #c62828, #e53935); }
.cycle-phase-card.follicular { background: linear-gradient(135deg, #f57f17, #fb8c00); }
.cycle-phase-card.ovulation { background: linear-gradient(135deg, #2e7d32, #43a047); }
.cycle-phase-card.luteal { background: linear-gradient(135deg, #4527a0, #7b1fa2); }
.cycle-phase-card.unknown { background: linear-gradient(135deg, #455a64, #607d8b); }
.cycle-phase-label { font-size: 12px; font-weight: 700; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.cycle-phase-name { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.cycle-phase-day { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
.cycle-phase-tip { font-size: 13px; opacity: 0.9; line-height: 1.5; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 12px; }
.cycle-section { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
.cycle-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.cycle-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
.cycle-day { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: pointer; }
.cycle-day.menstruation { background: #ffcdd2; color: #c62828; }
.cycle-day.follicular { background: #fff3e0; color: #f57f17; }
.cycle-day.ovulation { background: #e8f5e9; color: #2e7d32; }
.cycle-day.luteal { background: #ede7f6; color: #4527a0; }
.cycle-day.today { outline: 2px solid var(--primary); outline-offset: 1px; }
.cycle-day.other-month { opacity: 0.3; }
.cycle-cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.cycle-cal-header span { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-hint); }
.cycle-stats-row { display: flex; gap: 10px; }
.cycle-stat { flex: 1; background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
.cycle-stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
.cycle-stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.cycle-nutrient-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.cycle-nutrient-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.cycle-nutrient-emoji { font-size: 20px; }
.cycle-nutrient-name { font-size: 13px; font-weight: 700; }
.cycle-nutrient-why { font-size: 12px; color: var(--text-secondary); }

/* ── Forms ── */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

.form-control {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.form-control:focus { outline: none; border-color: var(--primary); }

.input-with-unit { display: flex; gap: 8px; align-items: center; }
.input-with-unit .form-control { flex: 1; }
.unit-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 40px;
}

.form-hint { font-size: 12px; color: var(--text-hint); margin-top: 5px; }
.error-msg { color: var(--low); font-size: 13px; margin-bottom: 10px; }

/* ── Buttons ── */
.btn-primary {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 10px;
  transition: background 0.2s;
}
.btn-primary:active { background: var(--primary-dark); }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 12px;
  background: #f0f0f0;
  color: var(--text);
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 10px;
}

.btn-danger {
  display: block;
  width: 100%;
  padding: 12px;
  background: #ffeaea;
  color: var(--low);
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
}

/* ── Reminder Card ── */
.reminder-time-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.reminder-time-input {
  flex: 1;
  max-width: 140px;
}
.btn-save-reminder {
  flex-shrink: 0;
  padding: 10px 18px;
  font-size: 14px;
}
.reminder-note {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-hint);
}

/* ── Entry Screen ── */
.entry-screen { }
.entry-form-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.biomarker-info-card {
  background: var(--primary-light);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.biomarker-info-card h3 { color: var(--primary); margin-bottom: 8px; }
.bm-description { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
.bm-function { font-size: 13px; margin-bottom: 10px; color: var(--text-secondary); }
.bm-food-first-hint {
  background: linear-gradient(135deg,#E8F5E9,#F1F8E9); border: 1px solid #C5E1A5;
  border-radius: 10px; padding: 10px 12px; margin: 8px 0; font-size: 13px;
  color: #2E7D32; line-height: 1.4;
}
.bm-food-first-hint strong { color: #1B5E20; }
.bm-disclaimer-hint {
  font-size: 11px; color: var(--text-hint); background: var(--bg);
  border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; line-height: 1.4;
}

/* ── Trend Screen ── */
.trend-screen { }
.trend-selector-row { margin-bottom: 0; }
.trend-select { font-weight: 600; font-size: 15px; }

.status-banner {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.status-text { font-weight: 600; font-size: 15px; }
.latest-value { font-size: 22px; font-weight: 700; margin-left: auto; }
.ref-text { font-size: 12px; color: var(--text-secondary); width: 100%; }

.chart-container {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.no-data-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.no-data-card p { margin-bottom: 16px; color: var(--text-secondary); }

/* ── History Table ── */
.measurements-history {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.measurements-history h3 { margin-bottom: 12px; font-size: 16px; }

.history-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.history-table th { text-align: left; padding: 6px 8px; color: var(--text-secondary); font-size: 12px; border-bottom: 1px solid var(--border); }
.history-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
.history-table tr:last-child td { border-bottom: none; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  color: white;
  font-size: 11px;
  font-weight: 600;
}

.btn-delete { background: none; border: none; font-size: 16px; padding: 4px; opacity: 0.6; }
.btn-delete:hover { opacity: 1; }

/* ── Foods & Recipes ── */
.info-section {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.info-section h3 { margin-bottom: 12px; font-size: 16px; }

.foods-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.food-tag {
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 13px;
  font-weight: 500;
}

.symptoms-box {
  background: #fff3f3;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  border-left: 3px solid var(--low);
}
.symptoms-box h4 { font-size: 13px; margin-bottom: 6px; color: var(--low); }
.symptoms-box ul { padding-left: 16px; list-style: disc; }
.symptoms-box li { font-size: 13px; margin-bottom: 3px; }

.tips-section { margin-bottom: 14px; }
.tips-section h4 { font-size: 13px; margin-bottom: 6px; }
.tip-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }

.recipe-card {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  margin-top: 10px;
}
.recipe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.recipe-title { font-weight: 600; font-size: 14px; }
.recipe-duration { font-size: 12px; color: var(--text-secondary); }
.recipe-highlight { font-size: 13px; color: var(--text-secondary); }

.btn-add-entry { margin-top: 8px; }

/* ── Profile Screen ── */
.profile-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.profile-card h3 { margin-bottom: 14px; font-size: 17px; }
.hint-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.disclaimer-text { font-size: 13px; color: var(--text-secondary); margin: 10px 0; line-height: 1.5; }
.version-text { font-size: 12px; color: var(--text-hint); margin-top: 8px; }
.about-card .disclaimer-text { border-left: 3px solid var(--primary); padding-left: 10px; }

/* ── Tips section ── */
.tips-section ul { padding-left: 16px; list-style: disc; }
.tips-section li { font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }

/* ── Disclaimer ── */
.disclaimer {
  background: #fff9e6;
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 8px;
  border-left: 4px solid #f0ad4e;
}
.disclaimer p { font-size: 12px; color: var(--text-secondary); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-height) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(33,33,33,0.92);
  color: white;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Locked Biomarker Cards ── */
.biomarker-locked { opacity: 0.65; border-left: 4px solid #E0E0E0 !important; }
.lock-icon { font-size: 16px; }
.locked-value { font-size: 14px; font-weight: 500; color: #9E9E9E; }
.btn-unlock { background: #FFF8E1; color: #F57F17; font-size: 12px; }
.self-test-badge { font-size: 11px; color: var(--primary); background: var(--primary-light); border-radius: 8px; padding: 2px 8px; display: inline-block; margin-bottom: 6px; }
.self-test-hint { font-size: 12px; color: var(--primary); margin-top: 4px; }

/* ── Premium Banner ── */
.premium-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, #1a7a6e, #2196F3);
  color: white; border-radius: var(--radius); padding: 12px 16px;
  margin-bottom: 16px; gap: 10px;
}
.premium-banner span { font-size: 13px; }
.btn-upgrade-sm {
  background: white; color: var(--primary); border-radius: 20px;
  padding: 5px 12px; font-size: 12px; font-weight: 700; white-space: nowrap;
}

/* ── Onboarding Screen ── */
.onboarding-screen {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 40px 24px 32px; background: var(--bg);
}
.onboarding-logo { font-size: 56px; margin-bottom: 12px; }
.onboarding-title { font-size: 28px; font-weight: 800; text-align: center; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
.onboarding-title .brand { color: var(--primary); }
.onboarding-sub { text-align: center; color: var(--text-secondary); font-size: 15px; margin-bottom: 24px; }
.onboarding-card { width: 100%; background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.onboarding-card h2 { font-size: 16px; margin-bottom: 6px; }
.step-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
.sex-buttons, .age-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
.sex-btn, .age-btn {
  flex: 1; min-width: 80px; padding: 10px 8px; border: 2px solid var(--border);
  border-radius: 10px; font-size: 14px; font-weight: 500; background: var(--bg);
  transition: all 0.2s; text-align: center;
}

   ══════════════════════════════════════════════════════════ */

/* Hub */

/* Fasten Screen */

.fasting-header { text-align: center; padding: 24px 16px 16px; }

}

}

}
.fasting-status-label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

.fasting-progress-wrap { margin: 12px 0; background: rgba(255,255,255,0.2); border-radius: 8px; height: 8px; overflow: hidden; }

}

.fasting-stages-list { margin: 0 16px 16px; }
.fasting-stage-item {

}

.fasting-stage-name { font-size: 13px; font-weight: 700; }
.fasting-stage-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.fasting-streak { margin: 0 16px 16px; background: var(--surface); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }

/* Blutzucker Tagesgang */

.glucose-slots { margin: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.glucose-slot {

  display: flex; align-items: center; gap: 12px; border: 1.5px solid var(--border);
}
.glucose-slot.has-value { border-color: var(--primary); }
.glucose-slot-icon { font-size: 24px; flex-shrink: 0; }
.glucose-slot-info { flex: 1; }
.glucose-slot-label { font-size: 13px; font-weight: 700; }
.glucose-slot-hint { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
.glucose-slot-input { width: 72px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-weight: 700; text-align: center; }

.glucose-status-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.glucose-info-box { margin: 0 16px 16px; background: #f8fbff; border: 1px solid #d0e8ff; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* Heißhunger Journal */
.cravings-screen { padding-bottom: 32px; }
.cravings-header { padding: 20px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
.cravings-title { font-size: 20px; font-weight: 800; }
.btn-add-craving { background: var(--primary); color: #fff; border-radius: 12px; padding: 8px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }
.craving-pattern-card { margin: 0 16px 16px; background: linear-gradient(135deg, #fff3e0, #ffe0b2); border-radius: var(--radius); padding: 16px; border: 1px solid #ffcc80; }

.craving-form-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.craving-form-row { margin-bottom: 14px; }
.craving-form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

.craving-hunger-row { display: flex; gap: 8px; }
.craving-hunger-btn {
  flex: 1; padding: 8px 4px; border-radius: 10px; border: 1.5px solid var(--border);
  font-size: 18px; cursor: pointer; text-align: center; transition: all 0.15s;
}
.craving-hunger-btn.active { border-color: var(--primary); background: var(--primary-light); }
.craving-mood-row { display: flex; gap: 8px; flex-wrap: wrap; }
.craving-mood-btn {
  padding: 8px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: 13px; cursor: pointer; transition: all 0.15s; background: var(--surface);
}
.craving-mood-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }
.craving-trigger-row { display: flex; gap: 8px; flex-wrap: wrap; }
.craving-trigger-btn {

}

.craving-note-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; resize: none; height: 70px; }
.btn-save-craving { width: 100%; padding: 13px; background: var(--primary); color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.craving-list { margin: 0 16px; }
.craving-list-header { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.craving-item {
  background: var(--surface); border-radius: 14px; padding: 14px; margin-bottom: 10px;
  border: 1px solid var(--border); position: relative;
}
.craving-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.craving-item-what { font-size: 15px; font-weight: 700; }
.craving-item-time { font-size: 12px; color: var(--text-hint); }
.craving-item-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.craving-tag { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--bg); color: var(--text-secondary); }

.craving-empty { text-align: center; padding: 32px 16px; color: var(--text-hint); font-size: 14px; }
.btn-delete-craving { position: absolute; top: 10px; right: 10px; background: none; color: var(--text-hint); font-size: 16px; cursor: pointer; }

/* ── Premium Screen ── */

.premium-icon { font-size: 52px; margin-bottom: 8px; }

.price-card { display: flex; gap: 12px; margin-bottom: 16px; }

.feature-list { display: flex; flex-direction: column; gap: 10px; }
.feature-item { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; }
.feature-check { font-size: 16px; flex-shrink: 0; }
.legal-text { font-size: 11px; color: var(--text-hint); text-align: center; padding: 0 16px; margin-top: 8px; }

/* ── Recipe Card Expand ── */
.recipe-card {
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin-bottom: 10px; background: var(--surface);
  cursor: pointer; transition: box-shadow 0.2s;
}

.recipe-ingredients-list { list-style: disc; padding-left: 18px; font-size: 14px; color: var(--text); line-height: 1.8; }
.recipe-steps-list { list-style: decimal; padding-left: 18px; font-size: 14px; color: var(--text); line-height: 1.8; }
.recipe-steps-list li { margin-bottom: 4px; }

/* ── Dashboard v2 ── */
.dash-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 8px; }
.btn-pdf-export { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 7px 13px; font-size: 13px; font-weight: 600; color: var(--primary); cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.2s; white-space: nowrap; margin-top: 4px; }
.btn-pdf-export:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.health-score-bar {
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(135deg, #1a7a6e 0%, #21938a 100%);
  border-radius: 16px; margin: 0 16px 16px; padding: 18px 20px;
  color: #fff;
}
.health-score-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
.health-score-ring svg { width: 56px; height: 56px; }
.health-score-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 15px; font-weight: 800; color: #fff; line-height: 1; }
.health-score-num small { font-size: 9px; font-weight: 600; }
.health-score-detail { flex: 1; }
.health-score-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.health-score-sub { font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
.health-score-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.hsp { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.hsp.ok { background: rgba(255,255,255,0.25); color: #fff; }
.hsp.low { background: #FFA726; color: #fff; }
.hsp.high { background: #EF5350; color: #fff; }
.empty-score { background: var(--surface); border-radius: 12px; margin: 0 16px 16px; padding: 16px; text-align: center; color: var(--text-secondary); font-size: 14px; }

/* ── Longevity Hub ── */
.longevity-hub {
  background: var(--surface); border-radius: 16px; margin: 0 16px 16px;
  padding: 18px 16px; box-shadow: var(--shadow);
  border: 1px solid rgba(26,122,110,0.12);
}

}

.longevity-scores { flex: 1; }
.longevity-teaser-msg { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
.longevity-premium-badge { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 700; background: var(--primary); color: #fff; padding: 3px 10px; border-radius: 20px; }

.pillar-icon { font-size: 16px; grid-row: span 2; }

.longevity-disclaimer { font-size: 11px; color: var(--text-hint); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.4; }

/* ── Category Tabs ── */

}

/* ── BLS 4.0 Foods Section ── */
.bls-section { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
.bls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

.bls-badge { font-size: 10px; font-weight: 700; background: #E8F5E9; color: #2E7D32; border-radius: 20px; padding: 3px 9px; text-transform: uppercase; letter-spacing: 0.5px; }

.bls-food-info { flex: 1; min-width: 0; }
.bls-food-name { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bls-bar-wrap { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.bls-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #2aa99a); border-radius: 3px; transition: width 0.6s ease; }

// ── Biomarker-Bildungskarte im Detail-Screen ──
function renderBiomarkerEduCard(bm) {
  if (!bm.description && !bm.function) return '';
  const lifestyleTips = LIFESTYLE_TIPS[bm.id] || [];
  const tipsHtml = lifestyleTips.length
    ? `<div class="edu-section">
        <div class="edu-section-title">🌱 Was du im Alltag tun kannst</div>
        <ul class="edu-lifestyle-list">${lifestyleTips.map(t => `<li>${t}</li>`).join('')}</ul>
       </div>`
    : '';

  return `
  <div class="bm-edu-card" id="bm-edu-card">
    <div class="bm-edu-header" id="bm-edu-toggle">
      <span class="bm-edu-icon">📖</span>
      <div>
        <div class="bm-edu-title">Was ist ${bm.name}?</div>
        <div class="bm-edu-subtitle">Wirkung, Bedeutung & Alltagstipps</div>
      </div>
      <span class="bm-edu-arrow">▼</span>
    </div>
    <div class="bm-edu-body">
      ${bm.description ? `<div class="edu-section">
        <p class="edu-description">${bm.description}</p>
      </div>` : ''}
      ${bm.function ? `<div class="edu-section">
        <div class="edu-section-title">⚙️ Funktion im Körper</div>
        <p class="edu-function">${bm.function}</p>
      </div>` : ''}
      ${tipsHtml}
      <p class="edu-disclaimer">ℹ️ Diese Informationen dienen der allgemeinen Aufklärung. Sie ersetzen keine medizinische Beratung.</p>
    </div>
  </div>`;
}

        <a href="${t.url}" target="_blank" rel="noopener" class="gut-test-card">

function getRefRange(bm, profile) {
  if (bm.refMin==null && bm.refMax==null) return {min:null,max:null};
  const sex = profile && profile.sex;
  if (sex && bm.refByGender && bm.refByGender[sex]) return {min:bm.refByGender[sex].min, max:bm.refByGender[sex].max};
  return {min:bm.refMin, max:bm.refMax};
}
function getRefRangeLabel(bm, profile) {
  const r=getRefRange(bm,profile);
  if (r.min==null) return '–';
  return r.min+'–'+r.max+' '+bm.unit;
}

// ── STATUS ────────────────────────────────────────────────
function getStatus(value, bm, profile) {
  if (value==null||value==='') return 'unknown';
  const v=parseFloat(value); if(isNaN(v)) return 'unknown';
  const r=getRefRange(bm,profile||{});
  if (r.min==null && r.max==null) return 'unknown';
  if (r.min!=null && v<r.min) return 'low';
  if (r.max!=null && v>r.max) return 'high';
  return 'ok';
}
function getStatusLabel(s) { return {low:'Zu niedrig',ok:'Im Normbereich',high:'Zu hoch',unknown:'Kein Wert'}[s]||'Unbekannt'; }
function getStatusColor(s) { return {low:'#E53935',ok:'#43A047',high:'#FB8C00',unknown:'#BDBDBD'}[s]||'#BDBDBD'; }

function fmtDate(iso) { if(!iso) return ''; const [y,m,d]=iso.split('-'); return d+'.'+m+'.'+y; }

// ── VALIDATION ────────────────────────────────────────────
function validateMeasurement(value, bm) {
  if (value===''||value==null) return {valid:false,error:'Bitte einen Wert eingeben.'};
  const v=parseFloat(value); if(isNaN(v)) return {valid:false,error:'Bitte eine gültige Zahl eingeben.'};
  if (v<0) return {valid:false,error:'Wert muss > 0 sein.'};
  if (bm.id==='gewicht' && (v<10||v>500)) return {valid:false,error:'Bitte plausibles Gewicht (10–500 kg).'};
  return {valid:true,error:null};
}

  getLast7Days() {
    const all = this._load();
    const result = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const day = all[key] || { steps: 0, activities: [] };
      const totalCal = day.activities.reduce((s, a) => s + (a.calories || 0), 0);
      result.push({ date: key, day: ['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()], steps: day.steps || 0, calories: totalCal, isToday: i === 0 });
    }
    return result;

// Cycle Repository
const cycleRepo = {
  _key: 'vm_cycle',
  get() { return storage.get(this._key) || { periodStarts: [], cycleLength: 28, periodLength: 5 }; },
  save(data) { storage.set(this._key, Object.assign(this.get(), data)); },
  getCurrentPhase() {
    const d = this.get();
    if (!d.periodStarts.length) return null;
    const last = new Date(d.periodStarts[d.periodStarts.length - 1]);
    const today = new Date(); today.setHours(0,0,0,0);
    const dayOfCycle = Math.floor((today - last) / 86400000) + 1;
    const cl = d.cycleLength || 28;
    const pl = d.periodLength || 5;
    const dayInCycle = ((dayOfCycle - 1) % cl) + 1;
    if (dayInCycle <= pl) return { phase: 'menstruation', day: dayInCycle, label: 'Menstruation', emoji: '🔴' };
    if (dayInCycle <= 13) return { phase: 'follicular', day: dayInCycle, label: 'Follikelphase', emoji: '🟠' };
    if (dayInCycle <= 15) return { phase: 'ovulation', day: dayInCycle, label: 'Eisprung', emoji: '🟢' };
    return { phase: 'luteal', day: dayInCycle, label: 'Lutealphase', emoji: '🟣' };
  },
  predictNext() {
    const d = this.get();
    if (!d.periodStarts.length) return null;
    const last = new Date(d.periodStarts[d.periodStarts.length - 1]);
    const next = new Date(last); next.setDate(next.getDate() + (d.cycleLength || 28));
    const today = new Date(); today.setHours(0,0,0,0);
    const daysUntil = Math.round((next - today) / 86400000);
    return { date: next.toLocaleDateString('de-DE', { day:'2-digit', month:'long' }), daysUntil };
  }
};

function calcCalories(met, minutes, weightKg) {

const LONGEVITY_WEIGHTS = {
  hscrp: 0.15, hba1c: 0.12, glucose: 0.10, coq10: 0.10,
  testosteron: 0.10, cortisol: 0.10, omega3: 0.08, vitamin_d: 0.08,

};

function calcLongevityScore(latestAll, profile) {
  let totalWeight = 0, totalScore = 0;
  for (const [id, weight] of Object.entries(LONGEVITY_WEIGHTS)) {
    const entry = latestAll[id];
    if (!entry) continue;
    const bm = CATALOG.biomarkers.find(b => b.id === id);
    if (!bm) continue;
    const status = getStatus(entry.value, bm, profile);
    const pts = status === 'ok' ? 1.0 : status === 'low' ? 0.3 : status === 'high' ? 0.2 : null;
    if (pts === null) continue;
    totalScore += pts * weight;
    totalWeight += weight;
  }
  if (totalWeight < 0.1) return null; // not enough data
  return Math.round((totalScore / totalWeight) * 100);
}

function calcBiologicalAge(longevityScore, chronologicalAge) {
  if (!longevityScore || !chronologicalAge) return null;
  // Score 100 = 8 years younger, Score 50 = same age, Score 0 = 10 years older
  const delta = Math.round(((longevityScore - 50) / 50) * 8);
  return Math.max(18, chronologicalAge - delta);
}

function renderLongevityHub(latestAll, profile) {
  const score = calcLongevityScore(latestAll, profile);
  const age = profile.birthYear ? new Date().getFullYear() - profile.birthYear : null;
  const bioAge = calcBiologicalAge(score, age);
  const gender = profile.sex || 'f';
  const isPremium = entitlements.isPremium();

  // Pillar scores
  const pillarHtml = Object.entries(LONGEVITY_PILLARS).map(([key, pillar]) => {
    const pillarBms = pillar.ids.map(id => CATALOG.biomarkers.find(b=>b.id===id)).filter(Boolean);
    const tracked = pillarBms.filter(bm=>latestAll[bm.id]);
    const ok = tracked.filter(bm=>getStatus(latestAll[bm.id]?.value,bm,profile)==='ok').length;
    const total = tracked.length;
    const pct = total > 0 ? Math.round((ok/total)*100) : null;
    const color = pct===null?'#9CA3AF':pct>=80?'#43A047':pct>=50?'#FFA726':'#EF5350';
    return `<div class="longevity-pillar" title="${pillar.label}">
      <div class="pillar-icon">${pillar.icon}</div>
      <div class="pillar-bar-wrap"><div class="pillar-bar" style="width:${pct||0}%;background:${color}"></div></div>
      <div class="pillar-label">${pillar.label}</div>
      ${pct!==null?`<div class="pillar-pct" style="color:${color}">${pct}%</div>`:'<div class="pillar-pct" style="color:#9CA3AF">–</div>'}
    </div>`;
  }).join('');

  if (!score) {
    // No data yet — teaser card
    return `<div class="longevity-hub teaser">
      <div class="longevity-teaser-inner">
        <div class="longevity-avatar-wrap">${renderLongevityAvatar(50, gender)}</div>
        <div>
          <div class="longevity-hub-title">🧬 Longevity Hub</div>
          <div class="longevity-teaser-msg">Trage deine Blutwerte ein,<br>um dein <strong>biologisches Alter</strong> zu erhalten.</div>
          ${!isPremium?'<div class="longevity-premium-badge">⭐ Premium-Feature</div>':''}
        </div>
      </div>
    </div>`;
  }

  const scoreColor = score>=80?'#43A047':score>=60?'#66BB6A':score>=40?'#FFA726':'#EF5350';
  const ageDiff = bioAge && age ? age - bioAge : null;
  const ageDiffLabel = ageDiff===null?'':(ageDiff>0?`${ageDiff} Jahre jünger 🎉`:ageDiff<0?`${Math.abs(ageDiff)} Jahre älter ⚠️`:'Genau dein Alter ✓');

  return `<div class="longevity-hub">
    <div class="longevity-hub-header">
      <div class="longevity-avatar-wrap">${renderLongevityAvatar(score, gender)}</div>
      <div class="longevity-scores">
        <div class="longevity-hub-title">🧬 Longevity Score</div>
        <div class="longevity-score-big" style="color:${scoreColor}">${score}<small>/100</small></div>
        ${bioAge?`<div class="longevity-bio-age">Biologisches Alter: <strong>${bioAge} Jahre</strong>${ageDiffLabel?` · <span style="color:${ageDiff>0?'#43A047':'#EF5350'}">${ageDiffLabel}</span>`:''}</div>`:''}
        <div class="longevity-score-ring-wrap">
          <svg viewBox="0 0 40 8" width="120" height="14">
            <rect x="0" y="2" width="120" height="5" rx="3" fill="#E5E7EB"/>
            <rect x="0" y="2" width="${Math.round(score*1.2)}" height="5" rx="3" fill="${scoreColor}"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="longevity-pillars">${pillarHtml}</div>
    <div class="longevity-disclaimer">ℹ️ Biologisches Alter ist eine Schätzung basierend auf deinen Blutwerten — kein medizinischer Befund.</div>
  </div>`;
}

function printReport() {
  const profile = profileRepo.get();
  const allBm = CATALOG.biomarkers.filter(b => b.category !== 'body');
  const latestAll = {};
  allBm.forEach(bm => {
    const ms = measurementRepo.getByBiomarker(bm.id);
    if (ms.length > 0) latestAll[bm.id] = ms[ms.length - 1];
  });

  const trackedBms = allBm.filter(b => latestAll[b.id]);
  if (trackedBms.length === 0) {
    alert('Keine Messwerte vorhanden. Trage zuerst einige Werte ein.');
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const statusCounts = { ok: 0, low: 0, high: 0, unknown: 0 };
  trackedBms.forEach(bm => {
    const s = getStatus(latestAll[bm.id].value, bm, profile);
    statusCounts[s] = (statusCounts[s] || 0) + 1;
  });

  // ── Group by category ──
  const catOrder = ['vitamins', 'minerals', 'blood_lipids', 'lab_values', 'longevity'];
  const catNames = { vitamins: 'Vitamine', minerals: 'Mineralstoffe & Spurenelemente', blood_lipids: 'Blutfette', lab_values: 'Laborwerte', longevity: 'Longevity-Marker' };
  const grouped = {};
  catOrder.forEach(c => { grouped[c] = trackedBms.filter(b => b.category === c); });

  // ── Action items: values needing attention ──
  const actionItems = trackedBms
    .map(bm => ({ bm, status: getStatus(latestAll[bm.id].value, bm, profile), val: latestAll[bm.id].value }))
    .filter(x => x.status === 'low' || x.status === 'high')
    .slice(0, 5);

  // ── Build table rows ──
  function buildRows(bms) {
    return bms.map(bm => {
      const m = latestAll[bm.id];
      const s = getStatus(m.value, bm, profile);
      const r = getRefRange(bm, profile);
      const refLabel = r.min != null && r.max != null
        ? `${r.min}–${r.max} ${bm.unit}`
        : r.max != null ? `< ${r.max} ${bm.unit}` : '–';
      const statusLabel = { ok: '✓ Optimal', low: '↓ Niedrig', high: '↑ Erhöht', unknown: '?' }[s] || '–';
      const statusColor = { ok: '#2E7D32', low: '#E65100', high: '#B71C1C', unknown: '#666' }[s] || '#666';
      return `<tr>
        <td class="td-name">${bm.name}</td>
        <td class="td-val">${m.value} <span class="unit">${bm.unit}</span></td>
        <td class="td-ref">${refLabel}</td>
        <td class="td-status" style="color:${statusColor};font-weight:700">${statusLabel}</td>
        <td class="td-date">${fmtDate(m.date)}</td>
      </tr>`;
    }).join('');
  }

  // ── Action items list ──
  const actionHtml = actionItems.length > 0
    ? `<div class="section"><h2>⚡ Prioritäten & Handlungsempfehlungen</h2>
        ${actionItems.map(x => {
          const tips = x.bm.tips?.slice(0, 2) || [];
          const foods = (BLS_TOP_FOODS[x.bm.id] || []).slice(0, 3).map(f => f.name).join(', ');
          const isLower = !!x.bm.lowerIsBetter;
          const actionText = x.status === 'high'
            ? (isLower ? `Dein ${x.bm.name}-Wert ist erhöht — möglichst senken.` : `Dein ${x.bm.name}-Wert ist zu hoch — Ernährung & Lifestyle anpassen.`)
            : `Dein ${x.bm.name}-Wert ist zu niedrig — gezielte Versorgung prüfen.`;
          return `<div class="action-item">
            <div class="action-header">
              <strong>${x.bm.name}</strong>
              <span class="action-val">${x.val} ${x.bm.unit}</span>
            </div>
            <p>${actionText}</p>
            ${foods && !isLower ? `<p class="food-tip">🥗 Relevante Lebensmittel: <em>${foods}</em></p>` : ''}
            ${isLower && BLS_TOP_FOODS[x.bm.id] ? `<p class="food-tip">🥗 Hilfreiche Lebensmittel: <em>${(BLS_TOP_FOODS[x.bm.id]||[]).slice(0,3).map(f=>f.name).join(', ')}</em></p>` : ''}
            ${tips.map(t => `<p class="tip-item">💡 ${t}</p>`).join('')}
          </div>`;
        }).join('')}
      </div>` : '';

  // ── Category sections ──
  let catHtml = '';
  catOrder.forEach(cat => {
    const bms = grouped[cat];
    if (!bms || bms.length === 0) return;
    catHtml += `
      <div class="section">
        <h2>${catNames[cat] || cat}</h2>
        <table>
          <thead><tr><th>Biomarker</th><th>Wert</th><th>Referenz</th><th>Status</th><th>Datum</th></tr></thead>
          <tbody>${buildRows(bms)}</tbody>
        </table>
      </div>`;
  });

  const genderLabel = profile.sex === 'm' ? 'Männlich' : profile.sex === 'f' ? 'Weiblich' : '–';
  const birthLabel = profile.birthYear ? `geb. ${profile.birthYear}` : '';

  const reportHtml = `<!DOCTYPE html><html lang="de"><head>
  <meta charset="UTF-8">
  <title>VitalMetrics Bericht – ${dateStr}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11pt; color: #222; background: #fff; }
    .page { max-width: 760px; margin: 0 auto; padding: 32px 40px; }

    /* Header */
    .report-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #1a7a6e; padding-bottom: 16px; margin-bottom: 20px; }
    .report-title { font-size: 22pt; font-weight: 800; color: #1a7a6e; letter-spacing: -0.5px; }
    .report-subtitle { font-size: 10pt; color: #555; margin-top: 2px; }
    .report-meta { text-align: right; font-size: 9.5pt; color: #555; line-height: 1.6; }
    .report-meta strong { color: #222; }

    /* Summary strip */
    .summary-strip { display: flex; gap: 12px; margin-bottom: 24px; }

    .chip-high  { background: #FFEBEE; border: 1px solid #EF9A9A; color: #B71C1C; }
    .chip-total { background: #E3F2FD; border: 1px solid #90CAF9; color: #1565C0; }

    /* Sections */

    .section h2 { font-size: 12pt; font-weight: 700; color: #1a7a6e; border-bottom: 1px solid #d0ede9; padding-bottom: 5px; margin-bottom: 10px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 9.5pt; }
    thead tr { background: #f0f9f8; }

    /* Action items */

    .action-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

    .food-tip { color: #2E7D32 !important; }

  </head><body>

            <span class="card-name">${bm.name}${isBmi?'<span class="bmi-auto-badge">Auto</span>':''}</span>
          </div>
          <div class="card-value-v2">${valueLabel}</div>
          <div class="card-ref">Ref: ${refLabel}</div>
          ${isBmi&&!profile.height?'<div class="no-height-warning" style="font-size:11px;margin-top:4px">📏 Größe im Profil eintragen</div>':''}
          <div class="card-actions">
            ${isBmi
              ? (latest?'<button class="btn-card btn-trend" data-id="'+bm.id+'">📈 Verlauf</button>':'<button class="btn-card btn-entry" data-id="gewicht">+ Gewicht</button>')
              : '<button class="btn-card btn-entry" data-id="'+bm.id+'">+ Eintragen</button>'+(latest?'<button class="btn-card btn-trend" data-id="'+bm.id+'">📈</button>':'')
            }
          </div>
        </div>`;
      } else {
        html+=`<div class="biomarker-card v2 biomarker-locked" data-id="${bm.id}">
          <div class="card-top"><span class="card-emoji">🔒</span><span class="card-name">${bm.name}</span></div>
          <div class="card-value-v2 locked-value">Premium</div>
          <div class="card-ref">Ref: ${refLabel}</div>
          <div class="card-actions"><button class="btn-card btn-unlock">⭐ Freischalten</button></div>
        </div>`;
      }
    }
    html+=`</div></div>`;
  }
  html+=`<div class="disclaimer"><p>ℹ️ <strong>Kein Medizinprodukt.</strong> Diese App dient lediglich Informationszwecken. Für medizinische Beratung oder eine Diagnose solltest du dich an eine medizinische Fachkraft wenden. Referenzwerte nach DGE${profile.sex?' ('+( profile.sex==='f'?'♀':'♂')+')':''}.</p></div></div>`;
  c.innerHTML=html;

  // Tab scroll navigation
  c.querySelectorAll('.dash-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const target=document.getElementById('cat-'+tab.dataset.cat);
      if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
      c.querySelectorAll('.dash-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  c.querySelectorAll('.btn-entry').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();navigate('entry',b.dataset.id);}));
  c.querySelectorAll('.btn-trend').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();navigate('trend',b.dataset.id);}));
  c.querySelectorAll('.biomarker-card.v2:not(.biomarker-locked)').forEach(card=>card.addEventListener('click',()=>navigate('trend',card.dataset.id)));
  c.querySelectorAll('.btn-unlock,.btn-upgrade-sm,#btn-upg-banner').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();navigate('premium');}));

  // ── Biomarker Info Card toggle ──
  const bmInfoToggle = c.querySelector('#bm-info-card-toggle');
  if (bmInfoToggle) {
    bmInfoToggle.addEventListener('click', () => {
      const card = c.querySelector('#bm-info-card');
      if (card) card.classList.toggle('open');
    });
  }

  // ── PDF Export Button ──
  const btnPdf = c.querySelector('#btn-pdf-export');
  if (btnPdf) btnPdf.addEventListener('click', () => printReport());
}

// ── BMI HELPER ─────────────────────────────────────────────
function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm || heightCm < 50) return null;
  return Math.round((weightKg / Math.pow(heightCm / 100, 2)) * 10) / 10;
}

function renderEntry(c) {
  const profile=profileRepo.get();
  const selId=currentBiomarkerId||'vitamin_d';
  // BMI wird automatisch berechnet – aus manueller Eingabe ausschließen
  const trackable=CATALOG.biomarkers.filter(bm=>entitlements.canTrack(bm.id) && bm.id!=='bmi');
  const opts=trackable.map(bm=>`<option value="${bm.id}" ${bm.id===selId?'selected':''}>${bm.name} (${bm.unit})</option>`).join('');
  const today=new Date().toISOString().split('T')[0];
  const effectiveId = selId==='bmi' ? 'gewicht' : selId;
  const selBm=CATALOG.biomarkers.find(b=>b.id===effectiveId)||trackable[0];
  const isGewicht = selBm?.id==='gewicht';
  const bmiPossible = isGewicht && !!profile.height;

  c.innerHTML=`<div class="screen entry-screen">
    <div class="screen-header"><h1 class="screen-title">Wert eintragen</h1></div>
    ${!profile.height?'<div class="no-height-warning">📏 Tipp: Trage deine Körpergröße im <strong>Profil</strong> ein, damit der BMI automatisch berechnet wird.</div>':''}
    <div class="entry-form-card">
      <div class="form-group">
        <label>Vitamin / Mineralstoff / Messwert</label>
        <select id="bm-sel" class="form-control">${opts}</select>
      </div>
      <div class="form-group">
        <label>Gemessener Wert</label>
        <div class="input-with-unit">
          <input type="number" id="bm-val" class="form-control" placeholder="z. B. 25" step="any" min="0">
          <span class="unit-label" id="unit-lbl">${selBm?.unit||''}</span>
        </div>
        <p class="form-hint" id="ref-hint">Referenzbereich (DGE): ${getRefRangeLabel(selBm,profile)}</p>
        <p class="self-test-hint" id="st-hint">${selBm?.selfTestNote?'🧪 '+selBm.selfTestNote:''}</p>
        <div id="bmi-preview" style="display:${bmiPossible?'block':'none'}">
          <p class="bmi-info-note">📐 BMI wird automatisch mitgespeichert (Größe: ${profile.height||'–'} cm)</p>
        </div>
      </div>
      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="bm-date" class="form-control" value="${today}" max="${today}">
      </div>
      <div class="form-group">
        <label>Notiz (optional)</label>
        <input type="text" id="bm-note" class="form-control" placeholder="z. B. nach Arztbesuch, Heimtest">
      </div>
      <p class="error-msg" id="err-msg" style="display:none"></p>
      <button class="btn-primary" id="btn-save">Speichern</button>
      <button class="btn-secondary" id="btn-cancel">Abbrechen</button>
    </div>
    <div class="biomarker-info-card" id="bm-info">${renderBmInfo(selBm)}</div>
  </div>`;

  const sel=c.querySelector('#bm-sel');
  sel.addEventListener('change',()=>{
    const bm=CATALOG.biomarkers.find(b=>b.id===sel.value);
    if(!bm) return;
    currentBiomarkerId=bm.id;
    c.querySelector('#unit-lbl').textContent=bm.unit;
    c.querySelector('#ref-hint').textContent='Referenzbereich (DGE): '+getRefRangeLabel(bm,profile);
    c.querySelector('#st-hint').textContent=bm.selfTestNote?'🧪 '+bm.selfTestNote:'';
    c.querySelector('#bm-info').innerHTML=renderBmInfo(bm);
    const preview=c.querySelector('#bmi-preview');
    if(preview) preview.style.display=(bm.id==='gewicht'&&profile.height)?'block':'none';
  });

  c.querySelector('#btn-save').addEventListener('click',()=>{
    const bm=CATALOG.biomarkers.find(b=>b.id===sel.value);
    const value=parseFloat(c.querySelector('#bm-val').value);
    const date=c.querySelector('#bm-date').value;
    const note=c.querySelector('#bm-note').value.trim();
    const errEl=c.querySelector('#err-msg');
    const {valid,error}=validateMeasurement(value,bm);
    if(!valid){errEl.textContent=error;errEl.style.display='block';return;}
    errEl.style.display='none';
    measurementRepo.add({biomarkerId:bm.id,value,date,note});
    // ── Auto-BMI: wenn Gewicht gespeichert und Größe bekannt ──
    if(bm.id==='gewicht' && profile.height) {
      const bmiVal=calcBMI(value,profile.height);
      if(bmiVal!==null) {
        measurementRepo.add({biomarkerId:'bmi',value:bmiVal,date,note:'Automatisch aus Gewicht berechnet'});
        showToast('✅ Gewicht + BMI ('+bmiVal+' kg/m²) gespeichert!');
      } else {
        showToast('✅ '+bm.name+' gespeichert!');
      }
    } else {
      showToast('✅ '+bm.name+' gespeichert!');
    }
    navigate('trend',bm.id);
  });
  c.querySelector('#btn-cancel').addEventListener('click',()=>navigate('dashboard'));
}

function renderBmInfo(bm) {
  if(!bm) return '';
  return `<h3>${bm.name}</h3>
    <p class="bm-description">${bm.description}</p>
    <p class="bm-function"><strong>🔬 Funktion:</strong> ${bm.function}</p>
    <div class="bm-food-first-hint">🥦 <strong>Ernährung zuerst:</strong> Versuche deinen Bedarf primär über eine ausgewogene Ernährung zu decken. Supplements sind nur bei nachgewiesenem Mangel sinnvoll – idealerweise nach Rücksprache mit einer Fachkraft.</div>
    <div class="bm-disclaimer-hint">ℹ️ Diese App dient lediglich Informationszwecken. Für medizinische Beratung oder eine Diagnose wende dich an eine medizinische Fachkraft.</div>
    ${bm.tips?.length?'<div class="tips-section"><strong>💡 Wissenswertes:</strong><ul>'+bm.tips.map(t=>'<li>'+t+'</li>').join('')+'</ul></div>':''}`;
}

function renderTrend(c) {
  const profile=profileRepo.get();
  const bmId=currentBiomarkerId||'vitamin_d';
  const bm=CATALOG.biomarkers.find(b=>b.id===bmId)||CATALOG.biomarkers[0];
  if(!entitlements.canTrack(bm.id)){navigate('premium');return;}

  const measurements=measurementRepo.getByBiomarker(bm.id);
  const latestM=measurements[measurements.length-1];
  const status=latestM?getStatus(latestM.value,bm,profile):'unknown';
  const sColor=getStatusColor(status);
  const r=getRefRange(bm,profile);

  const trackable=CATALOG.biomarkers.filter(b=>entitlements.canTrack(b.id));
  const opts=trackable.map(b=>`<option value="${b.id}" ${b.id===bm.id?'selected':''}>${b.name}</option>`).join('');

  const histRows=[...measurements].reverse().map(m=>{
    const s=getStatus(m.value,bm,profile);
    return `<tr><td>${fmtDate(m.date)}</td><td>${m.value} ${bm.unit}</td><td><span class="status-badge" style="background:${getStatusColor(s)}">${getStatusLabel(s)}</span></td><td><button class="btn-delete" data-id="${m.id}">🗑️</button></td></tr>`;
  }).join('');

  c.innerHTML=`<div class="screen trend-screen">
    <div class="screen-header">
      <select id="trend-sel" class="form-control trend-select">${opts}</select>
    </div>
    <div class="status-banner" style="background:${sColor}20;border-left:4px solid ${sColor}">
      <span class="status-dot" style="background:${sColor}"></span>
      <span class="status-text">${getStatusLabel(status)}</span>
      ${latestM?'<span class="latest-value">'+latestM.value+' '+bm.unit+'</span>':''}
      ${r.min!=null?'<span class="ref-text">Ref: '+getRefRangeLabel(bm,profile)+(profile.sex?' ('+( profile.sex==='f'?'♀':'♂')+')':'')+'</span>':''}
      ${bm.selfTestAvailable?'<span class="ref-text">🧪 '+bm.selfTestNote+'</span>':''}
    </div>
    ${measurements.length===0
      ? `<div class="no-data-card"><p>Noch keine Einträge für <strong>${bm.name}</strong>.</p><button class="btn-primary" id="btn-add-first">Ersten Wert eintragen</button></div>`
      : `<div class="chart-container"><canvas id="trend-chart"></canvas></div>
         <div class="measurements-history"><h3>Verlauf</h3>
         <table class="history-table"><thead><tr><th>Datum</th><th>Wert</th><th>Status</th><th></th></tr></thead>
         <tbody>${histRows}</tbody></table></div>`
    }
    ${renderBiomarkerEduCard(bm)}
    ${bm.category==='gut' ? renderGutEducationCard() : ''}
    ${bm.category==='gut' ? renderGutSpecialistTests(bm.id) : ''}
    ${bm.category!=='body'?renderFoodsSection(bm,status):''}
    <button class="btn-primary btn-add-entry" id="btn-add-entry">+ Neuen Wert eintragen</button>
  </div>`;

  if(measurements.length>0) drawChart(measurements,bm,profile);
  c.querySelector('#trend-sel').addEventListener('change',e=>navigate('trend',e.target.value));
  c.querySelector('#btn-add-entry')?.addEventListener('click',()=>navigate('entry',bm.id));
  c.querySelector('#btn-add-first')?.addEventListener('click',()=>navigate('entry',bm.id));
  // Biomarker Education Card toggle
  const bmEduToggle = c.querySelector('#bm-edu-toggle');
  if (bmEduToggle) {
    bmEduToggle.addEventListener('click', () => {
      const card = c.querySelector('#bm-edu-card');
      if (card) {
        card.classList.toggle('open');
        const arrow = bmEduToggle.querySelector('.bm-edu-arrow');
        if (arrow) arrow.textContent = card.classList.contains('open') ? '▲' : '▼';
      }
    });
  }
  // Gut Education Card toggle
  const gutEduToggle = c.querySelector('#gut-edu-toggle');
  if (gutEduToggle) {
    gutEduToggle.addEventListener('click', () => {
      const card = c.querySelector('#gut-edu-card');
      const arrow = c.querySelector('#gut-edu-arrow');
      if (card) {
        card.classList.toggle('open');
        if (arrow) arrow.textContent = card.classList.contains('open') ? '▲' : '▼';
      }
    });
  }
  c.querySelectorAll('.btn-delete').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('Eintrag löschen?')){measurementRepo.delete(parseInt(b.dataset.id));navigate('trend',bm.id);}
  }));
  // Recipe card expand/collapse
  c.querySelectorAll('.recipe-card').forEach(card=>{
    card.addEventListener('click',()=>{
      card.classList.toggle('expanded');
      const icon=card.querySelector('.recipe-expand-icon');
      if(icon) icon.textContent=card.classList.contains('expanded')?'▲ Rezept ausblenden':'▼ Rezept anzeigen';
    });
  });
}

function renderFoodsSection(bm, status) {
  // ── SAFETY: When value is HIGH ──
  if (status === 'high') {
    return `<div class="info-section">
      <div class="high-value-warning">
        <h4>⚠️ Dein ${bm.name}-Wert ist zu hoch</h4>
        <p>Ein zu hoher Wert kann gesundheitliche Risiken bergen. Wir zeigen dir hier bewusst <strong>keine</strong> Lebensmittelquellen an, da eine weitere Zufuhr den Wert verschlimmern könnte.</p>
        <p class="consult-note">Bitte besprich erhöhte Werte mit deinem Arzt oder deiner Ärztin.</p>
      </div>
      ${bm.tips?.length?'<div class="tips-section"><h4>💡 Allgemeine Tipps</h4>'+bm.tips.map(t=>'<p class="tip-text">'+t+'</p>').join('')+'</div>':''}
    </div>`;
  }

  // ── BLS 4.0 Top-10-Lebensmittel ──
  const blsFoods = BLS_TOP_FOODS[bm.id] || [];
  const maxAmount = blsFoods.length ? blsFoods[0].amount : 1;
  const isLowerBetter = !!bm.lowerIsBetter;
  const isLifestyleFoods = maxAmount === 0; // Gut/Mikrobiom-Marker: keine pro-100g-Mengen
  const hideAmounts = isLowerBetter || isLifestyleFoods;
  const blsSectionTitle = isLowerBetter ? '🥗 Lebensmittel, die helfen'
    : isLifestyleFoods ? '🥗 Ernährungsempfehlungen'
    : '🥗 Top 10 Lebensmittel';
  const blsBadgeText    = isLowerBetter ? 'Ernährungstipps · entzündungshemmend'
    : isLifestyleFoods ? 'Ernährungstipps · Mikrobiom'
    : 'BLS 4.0 · pro 100 g';
  const lowerBetterNote = isLowerBetter
    ? `<p class="bls-lower-note">Diese Lebensmittel können helfen, deinen ${bm.name}-Wert zu senken oder zu stabilisieren. Je kleiner der Wert, desto besser.</p>`
    : isLifestyleFoods
    ? `<p class="bls-lower-note">Diese Lebensmittel unterstützen dein Mikrobiom und fördern einen gesunden Darm.</p>`
    : '';
  const blsHtml = blsFoods.length ? `
    <div class="bls-section">
      <div class="bls-header">
        <h3>${blsSectionTitle}</h3>
        <span class="bls-badge">${blsBadgeText}</span>
      </div>
      ${lowerBetterNote}
      <div class="bls-list">
        ${blsFoods.map((f, i) => {
          const pct = isLifestyleFoods ? 80 : Math.round((f.amount / maxAmount) * 100);
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
          const amt = f.amount >= 10 ? Math.round(f.amount) : f.amount;
          return `<div class="bls-row">
            <span class="bls-rank">${medal}</span>
            <div class="bls-food-info">
              <span class="bls-food-name">${f.name}</span>
              <div class="bls-bar-wrap">
                <div class="bls-bar" style="width:${pct}%"></div>
              </div>
            </div>
            ${hideAmounts ? '' : `<span class="bls-amount">${amt} <small>${bm.unit}</small></span>`}
          </div>`;
        }).join('')}
      </div>
    </div>` : `<div class="info-section"><h3>🥗 Lebensmittelquellen</h3>
      <div class="foods-grid">${(bm.foods||[]).map(f=>'<span class="food-tag">'+f+'</span>').join('')}</div></div>`;

  // ── Mangelsymptome ──
  const symptomsHtml = status==='low'&&bm.deficiencySymptoms?.length
    ? `<div class="symptoms-box"><h4>⚠️ Typische Mangelsymptome</h4><ul>${bm.deficiencySymptoms.map(s=>'<li>'+s+'</li>').join('')}</ul></div>` : '';

  // ── Affiliate-Box (nicht bei HIGH) ──
  const affLink = getAffiliateLink(bm.id);
  const testLink = getTestLink(bm.id);
  const suppTitle = '💊 Supplement entdecken';
  const suppDesc  = isLowerBetter
    ? (status === 'ok'
        ? `Dein ${bm.name}-Wert ist im guten Bereich. Weiter so – anti-entzündliche Ernährung ist der beste Schutz.`
        : `Erhöhte ${bm.name}-Werte können durch gezielte Ernährung und Lifestyle-Maßnahmen gesenkt werden. Ein Supplement kann unterstützend wirken.`)
    : (status === 'low'
        ? `Dein ${bm.name}-Wert ist niedrig. Zuerst: Mahlzeiten anpassen (sieh Lebensmittelliste oben). Wenn nötig, kann ein Präparat unterstützen.`
        : `Dein ${bm.name}-Wert ist im Normalbereich. Weiter so – ausgewogene Ernährung ist der beste Schutz.`);

  // "Ernährung zuerst" Banner
  const ernaehrungBanner = `
    <div class="ernaehrung-banner">
      <span class="ernaehrung-banner-icon">🥦</span>
      <div>
        <strong>Ernährung zuerst!</strong>
        <span>Supplements sind kein Ersatz für eine ausgewogene Ernährung. Versuche deinen Bedarf immer zuerst über natürliche Lebensmittel zu decken.</span>
      </div>
    </div>`;

  const affiliateHtml = affLink ? `
    ${ernaehrungBanner}
    <div class="affiliate-box">
      <div class="affiliate-box-text">
        <strong>${suppTitle}</strong>
        <small>${suppDesc}</small>
      </div>
      <div class="affiliate-btn-group">
        <a href="${affLink}" target="_blank" rel="noopener sponsored" class="affiliate-btn">🛒 Supplement</a>
        ${testLink ? `<a href="${testLink}" target="_blank" rel="noopener sponsored" class="affiliate-btn affiliate-btn-test">🧪 Schnelltest</a>` : ''}
      </div>
      <span class="affiliate-disclaimer">* Affiliate-Links · kleine Provision bei Kauf, ohne Mehrkosten für dich · Kein medizinischer Rat – bitte Arzt konsultieren.</span>
    </div>` : `${ernaehrungBanner}`;

  // ── Rezepte ──
  const matchedRecipes = RECIPES.filter(r => r.tags && r.tags.includes(bm.id)).slice(0, 6);
  const recipesHtml = matchedRecipes.map((r, idx) => {
    const ingHtml = r.ingredients.map(i => '<li>' + i + '</li>').join('');
    const stepsHtml = r.steps.map(s => '<li>' + s + '</li>').join('');
    return `<div class="recipe-card" data-ridx="${idx}">
      <div class="recipe-header"><span class="recipe-title">${r.title}</span><span class="recipe-duration">⏱ ${r.duration} · ${r.servings} Port.</span></div>
      <p class="recipe-highlight">${r.highlight}</p>
      <span class="recipe-expand-icon">▼ Rezept anzeigen</span>
      <div class="recipe-body">
        <h5>Zutaten</h5><ul class="recipe-ingredients-list">${ingHtml}</ul>
        <h5>Zubereitung</h5><ol class="recipe-steps-list">${stepsHtml}</ol>
      </div>
    </div>`;
  }).join('');

  // ── Tipps ──
  const tipsHtml = bm.tips?.length
    ? `<div class="tips-section"><h4>💡 Tipps</h4>${bm.tips.map(t=>'<p class="tip-text">'+t+'</p>').join('')}</div>` : '';

  return `<div class="info-section">
    ${blsHtml}
    ${symptomsHtml}
    ${affiliateHtml}
    ${tipsHtml}
    ${matchedRecipes.length?'<h3 style="margin-top:20px">🍽️ Passende Rezepte ('+matchedRecipes.length+')</h3><div id="recipes-list">'+recipesHtml+'</div>':''}
  </div>`;
}

function drawChart(measurements, bm, profile) {
  const canvas=document.getElementById('trend-chart');
  if(!canvas||typeof Chart==='undefined') return;
  if(canvas._ci) canvas._ci.destroy();
  const r=getRefRange(bm,profile);
  const labels=measurements.map(m=>fmtDate(m.date));
  const values=measurements.map(m=>m.value);
  const pointColors=values.map(v=>getStatusColor(getStatus(v,bm,profile)));
  const datasets=[{label:bm.name,data:values,borderColor:'#1a7a6e',backgroundColor:'rgba(26,122,110,0.1)',pointBackgroundColor:pointColors,pointRadius:6,pointHoverRadius:8,tension:0.3,fill:true}];
  if(r.min!=null&&r.max!=null) {
    datasets.push({label:'Min ('+r.min+' '+bm.unit+')',data:measurements.map(()=>r.min),borderColor:'#43A04788',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false});
    datasets.push({label:'Max ('+r.max+' '+bm.unit+')',data:measurements.map(()=>r.max),borderColor:'#43A04788',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:'-1',backgroundColor:'rgba(67,160,71,0.07)'});
  }
  canvas._ci=new Chart(canvas,{type:'line',data:{labels,datasets},options:{responsive:true,plugins:{legend:{display:r.min!=null,position:'bottom',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>ctx.parsed.y+' '+bm.unit}}},scales:{y:{title:{display:true,text:bm.unit}}}}});
}

      </div>
      ${e.condition ? `<span style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px;display:block">${e.condition}</span>` : ''}
      <p style="font-size:13px;margin:0;color:var(--text)">${e.note}</p>

  });

const DEFAULT_REMINDER_MESSAGES = [
  '📊 VitalMetrics: Hast du heute deine Gesundheitswerte im Blick?',
  '🌱 Ein guter Tag für gesunde Entscheidungen — VitalMetrics erinnert dich.',
  '💧 Ausreichend Wasser getrunken heute? Deine Biomarker danken es dir.',
  '🥗 Ernährung ist Prävention — schau heute in deine VitalMetrics.',
];

function buildReminderText() {
  const measurements = JSON.parse(localStorage.getItem('vitalmetrics_measurements') || '{}');
  const catalog = getBiomarkerCatalog ? getBiomarkerCatalog() : [];
  const candidates = [];

  catalog.forEach(bm => {
    const val = parseFloat(measurements[bm.id]);
    if (isNaN(val)) return;
    const msgs = REMINDER_MESSAGES[bm.id];
    if (!msgs) return;

    const isLower = !!bm.lowerIsBetter;
    const refMin = bm.refMin;
    const refMax = bm.refMax;

    let status = null;
    if (isLower && refMax !== undefined && val > refMax) status = 'high';
    else if (!isLower) {
      if (refMin !== undefined && val < refMin) status = 'low';
      else if (refMax !== undefined && val > refMax) status = 'high';
    }

    if (status && msgs[status] && msgs[status].length > 0) {
      candidates.push(...msgs[status]);
    }
  });

  if (candidates.length === 0) {
    return DEFAULT_REMINDER_MESSAGES[Math.floor(Math.random() * DEFAULT_REMINDER_MESSAGES.length)];
  }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

async function scheduleHealthReminder() {
  try {
    const { LocalNotifications } = Capacitor.Plugins;
    if (!LocalNotifications) return;

    // Alte Erinnerung löschen
    await LocalNotifications.cancel({ notifications: [{ id: 1001 }] });

    const reminderTime = localStorage.getItem('vitalmetrics_reminder_time') || '09:00';
    const [hours, minutes] = reminderTime.split(':').map(Number);

    const now = new Date();
    const fireDate = new Date();
    fireDate.setHours(hours, minutes, 0, 0);
    if (fireDate <= now) {
      fireDate.setDate(fireDate.getDate() + 1);
    }

    const body = buildReminderText();

    await LocalNotifications.schedule({
      notifications: [{
        id: 1001,
        title: 'VitalMetrics',
        body,
        schedule: {
          at: fireDate,
          repeats: true,
          every: 'day',
        },
        sound: null,
        smallIcon: 'ic_stat_icon_config_sample',
        channelId: 'vitalmetrics_reminders',
      }],
    });
  } catch (e) {
    console.warn('Reminder scheduling failed:', e);
  }
}

async function initReminders() {
  try {
    if (typeof Capacitor === 'undefined' || !Capacitor.isNativePlatform()) return;
    const { LocalNotifications } = Capacitor.Plugins;
    if (!LocalNotifications) return;

    // Berechtigung anfragen
    const perm = await LocalNotifications.requestPermissions();
    if (perm.display !== 'granted') return;

    // Notification-Kanal erstellen (Android 8+)
    await LocalNotifications.createChannel({
      id: 'vitalmetrics_reminders',
      name: 'Gesundheitserinnerungen',
      description: 'Tägliche Biomarker-Erinnerungen',
      importance: 3,
      visibility: 1,
      sound: 'default',
      vibration: true,
    });

    await scheduleHealthReminder();
  } catch (e) {
    console.warn('initReminders failed:', e);
  }
}

// Reminder-Zeit in Einstellungen speichern und neu planen
function saveReminderTime(timeStr) {
  localStorage.setItem('vitalmetrics_reminder_time', timeStr);
  scheduleHealthReminder();
}

          <div class="tool-card-title">Heißhunger-Journal</div>
          <div class="tool-card-desc">Stimmung, Auslöser & Muster — verstehe deinen Hunger wirklich</div>
          ${cravings.length>0?`<div class="tool-card-meta">📓 ${cravings.length} Einträge gespeichert</div>`:`<div class="tool-card-meta">Noch keine Einträge</div>`}

  c.querySelector('#tool-fasting').addEventListener('click', () => navigate('fasting'));
  c.querySelector('#tool-glucose').addEventListener('click', () => navigate('glucose_day'));

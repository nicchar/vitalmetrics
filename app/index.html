<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a7a6e">
  <title>VitalMetrics</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <main id="screen-container"></main>
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Übersicht</span>
      </button>
      <button class="nav-item" data-screen="entry">
        <span class="nav-icon">➕</span>
        <span class="nav-label">Eintragen</span>
      </button>
      <button class="nav-item" data-screen="trend">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Verlauf</span>
      </button>
      <button class="nav-item" data-screen="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profil</span>
      </button>
    </nav>
  </div>
  <div id="vm-toast" class="toast"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
